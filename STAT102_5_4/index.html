<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>جامعة الملك سعود — السنة الأولى المشتركة — STAT 102 | 5.4 الاحتمالات الشرطية واستقلال الحوادث</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#f8fafc;
      --bg-warm:#fefefe;
      --card:#ffffff;
      --ink:#0f172a;
      --ink-soft:#1e293b;
      --muted:#64748b;
      --brand:#0369a1;
      --brand2:#0c4a6e;
      --brand-light:#e0f2fe;
      --accent:#0284c7;
      --good:#059669;
      --good-bg:#d1fae5;
      --bad:#dc2626;
      --bad-bg:#fee2e2;
      --warn:#d97706;
      --warn-bg:#fef3c7;
      --line:#e2e8f0;
      --line-soft:#f1f5f9;
      --shadow-sm: 0 1px 3px rgba(15,23,42,.06);
      --shadow: 0 4px 20px rgba(15,23,42,.07);
      --shadow-lg: 0 20px 50px rgba(15,23,42,.1);
      --r:16px;
      --r-lg:22px;
      --font:"Cairo", "Noto Sans Symbols 2", system-ui, sans-serif;
      --transition: .2s cubic-bezier(.4,0,.2,1);
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      font-family:var(--font);
      color:var(--ink);
      line-height:1.6;
      background:
        radial-gradient(ellipse 140% 80% at 90% 0%, rgba(3,105,161,.06), transparent 50%),
        radial-gradient(ellipse 100% 60% at 10% 100%, rgba(12,74,110,.04), transparent 45%),
        var(--bg);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .topbar{
      background: linear-gradient(135deg, var(--brand2) 0%, var(--brand) 50%, #0e7490 100%);
      color:#fff;
      padding:16px 14px;
      min-height:80px;
      position:sticky; top:0; z-index:10;
      box-shadow: var(--shadow-lg);
    }
    .topbar .row{
      max-width:1280px;
      margin:0 auto;
      display:flex;
      align-items:center;
      justify-content:space-between;
      position:relative;
      gap:16px;
      padding:12px 80px;
      min-height:56px;
    }
    .topbar .row .topbarRight{display:flex; align-items:center; gap:8px; flex:0 0 auto;}
    .topbar .row .timerBar{flex:0 0 auto;}
    .topbar .row .brandblock{position:absolute; left:50%; transform:translateX(-50%); display:flex; align-items:center; justify-content:center; gap:14px; min-width:0; max-width:55%; text-align:center;}
    .topbar .row .logoWrap{flex:0 0 auto;}
    .brandblock{display:flex; align-items:center; gap:14px; min-width:0; text-align:center;}
    .brandtext{min-width:0; text-align:center}
    .brandtext .u{font-size:19px;font-weight:800;letter-spacing:-.02em;line-height:1.2}
    .brandtext .u.en{font-size:13px;font-weight:700;opacity:.9;margin-top:2px;direction:ltr;unicode-bidi:embed}
    .sep{opacity:.6;margin:0 6px;font-weight:600;font-size:12px}
    .brandtext .d{font-size:13px;font-weight:700;opacity:.92;margin-top:2px;line-height:1.3}
    .brandtext .s{font-size:12px;opacity:.85;margin-top:2px;font-weight:600}

    .timerBar{font-size:14px;font-weight:800;white-space:nowrap;padding:6px 12px;background:rgba(255,255,255,.2);border-radius:10px;border:1px solid rgba(255,255,255,.35);min-width:90px;text-align:center;}
    .timerBar.warn{background:rgba(217,119,6,.4);border-color:rgba(255,255,255,.5);}
    .timerBar.done{background:rgba(220,38,38,.4);border-color:rgba(255,255,255,.5);}

    .logoWrap{
      position:absolute;
      left:14px;
      top:50%;
      transform:translateY(-50%);
      display:flex; align-items:center; justify-content:center;
      padding:10px 12px;
      background: rgba(255,255,255,.18);
      border:1px solid rgba(255,255,255,.35);
      border-radius:12px;
      box-shadow: 0 8px 20px rgba(0,0,0,.2);
      flex:0 0 auto;
      transition: var(--transition);
    }
    .logoWrap:hover{background:rgba(255,255,255,.25);transform:translateY(-50%) scale(1.02)}
    .logoWrap img{height:52px;width:auto;display:block;}

    .wrap{
      max-width:900px;
      margin:24px auto 40px;
      padding:0 24px;
      display:block;
    }
    @media (min-width:1100px){
      .wrap{ max-width:calc(66.666vw); }
    }
    @media (max-width: 820px){ .wrap{ max-width:100%; padding:0 12px; } }
    /* إخفاء اللوحات الجانبية من الشبكة – ستُعرض كدرج عائم */
    .side, .aiResultsRail { display:none !important; }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--r-lg);
      box-shadow: var(--shadow);
      overflow:hidden;
      transition: var(--transition);
    }
    .card:hover{box-shadow: 0 8px 30px rgba(15,23,42,.09)}
    .mainhead{
      padding:16px 20px;
      border-bottom:1px solid var(--line);
      display:flex; gap:12px; align-items:center; justify-content:center;
      background: linear-gradient(180deg, var(--line-soft) 0%, var(--card) 100%);
    }
    .pill{
      background:var(--brand-light);color:var(--brand);border:1px solid rgba(3,105,161,.25);
      border-radius:999px;padding:8px 14px;font-weight:800;font-size:13px;white-space:nowrap;
    }
    .pill.warn{background:var(--warn-bg);color:var(--warn);border-color:rgba(217,119,6,.3)}
    .content{padding:20px 22px 24px}

    .qtitleRow{display:flex; align-items:center; justify-content:space-between; gap:14px; margin-bottom:20px; flex-wrap:wrap;}
    .qtitle{display:flex; align-items:center; gap:14px; font-size:20px; font-weight:900; color:var(--ink); min-width:0;}
    .qtitle .qnum{
      width:48px;height:48px;border-radius:14px;display:grid;place-items:center;
      background: linear-gradient(135deg, var(--brand-light), #bae6fd);
      border:1px solid rgba(3,105,161,.2);color:var(--brand);font-weight:900;flex:0 0 auto;
      font-size:18px;
    }
    .qmeta{display:flex; gap:10px; flex-wrap:wrap; align-items:center;}

    .btn{
      border:1px solid var(--line);
      background:var(--card);
      color:var(--ink);
      border-radius:12px;
      padding:10px 16px;
      font-weight:800;
      font-size:14px;
      cursor:pointer;
      transition: var(--transition);
      display:inline-flex; align-items:center; gap:8px;
      user-select:none;
      white-space:nowrap;
      font-family:var(--font);
    }
    .btn:hover{
      background:var(--line-soft);
      border-color:var(--muted);
      transform:translateY(-1px);
      box-shadow: var(--shadow-sm);
    }
    .btn.primary{
      background: linear-gradient(135deg, var(--brand), var(--brand2));
      border-color: transparent;
      color:#fff;
    }
    .btn.primary:hover{
      background: linear-gradient(135deg, var(--accent), var(--brand));
      box-shadow: 0 4px 16px rgba(3,105,161,.35);
    }
    .btn.small{padding:8px 14px;font-size:13px;border-radius:10px}
    .btn:disabled{cursor:not-allowed;opacity:.55;transform:none;box-shadow:none}
        .btn.ai-help-btn{
      position:relative;
      isolation:isolate;
      border:1px solid rgba(8,145,178,.34);
      background:
        linear-gradient(135deg, rgba(224,242,254,.98) 0%, rgba(240,249,255,.98) 52%, rgba(207,250,254,.98) 100%);
      color:var(--brand2);
      font-weight:900;
      overflow:hidden;
      box-shadow:0 10px 24px rgba(8,145,178,.16);
    }
    .btn.ai-help-btn::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(115deg, transparent 0 28%, rgba(255,255,255,.78) 45%, transparent 62%),
        repeating-linear-gradient(90deg, rgba(14,165,233,.09) 0 1px, transparent 1px 12px);
      opacity:.9;
      transform:translateX(-26%);
      transition:transform .45s ease;
      z-index:-1;
    }
    .btn.ai-help-btn::after{
      content:"";
      position:absolute;
      inset:-1px;
      border-radius:inherit;
      pointer-events:none;
      box-shadow:0 0 0 0 rgba(8,145,178,.28);
      animation:aiPulse 2.4s infinite;
    }
    .btn.ai-help-btn:hover{
      border-color:#0891b2;
      background:linear-gradient(135deg, #dbeafe 0%, #e0f7ff 48%, #ccfbf1 100%);
      box-shadow:0 14px 28px rgba(8,145,178,.24);
      transform:translateY(-2px) scale(1.01);
    }
    .btn.ai-help-btn:hover::before{transform:translateX(6%)}
    .btn.ai-help-btn:hover .ai-help-glyph{animation:aiWake .9s ease both}
    .ai-help-glyph{
      width:22px;
      height:22px;
      border-radius:8px;
      display:inline-grid;
      place-items:center;
      position:relative;
      background:linear-gradient(135deg, #0f172a, #0369a1 72%, #22d3ee 100%);
      color:#fff;
      font-size:11px;
      font-weight:900;
      letter-spacing:.04em;
      box-shadow:0 6px 16px rgba(3,105,161,.28);
    }
    .ai-help-glyph::before,
    .ai-help-glyph::after{
      content:"";
      position:absolute;
    }
    .ai-help-glyph::before{
      inset:3px;
      border:1.5px solid rgba(255,255,255,.72);
      border-radius:4px;
      opacity:.88;
    }
    .ai-help-glyph::after{
      width:6px;
      height:6px;
      border-radius:50%;
      background:#67e8f9;
      box-shadow:0 0 0 2px rgba(255,255,255,.18), 0 0 14px rgba(103,232,249,.9);
    }
    .ai-help-panel{
      display:grid;
      gap:16px;
      animation:aiPanelReveal .38s ease both;
    }
    .ai-help-hero{
      position:relative;
      animation:aiHeroFloat 5.2s ease-in-out infinite;
      overflow:hidden;
      display:flex;
      align-items:center;
      gap:16px;
      padding:18px;
      border-radius:18px;
      border:1px solid rgba(8,145,178,.22);
      background:
        radial-gradient(circle at 18% 22%, rgba(34,211,238,.24), transparent 28%),
        radial-gradient(circle at 88% 18%, rgba(59,130,246,.18), transparent 24%),
        linear-gradient(135deg, #082f49 0%, #0f172a 48%, #0c4a6e 100%);
      color:#fff;
      box-shadow:0 18px 40px rgba(15,23,42,.18);
    }
    .ai-help-hero::after{
      content:"";
      position:absolute;
      inset:0;
      background:repeating-linear-gradient(90deg, rgba(255,255,255,.06) 0 1px, transparent 1px 16px);
      opacity:.35;
      pointer-events:none;
    }
    .ai-help-orb{
      width:72px;
      height:72px;
      border-radius:22px;
      flex:0 0 auto;
      display:grid;
      place-items:center;
      position:relative;
      border:1px solid rgba(255,255,255,.2);
      background:linear-gradient(135deg, rgba(255,255,255,.2), rgba(255,255,255,.08));
      box-shadow:inset 0 1px 0 rgba(255,255,255,.18), 0 14px 28px rgba(8,145,178,.22);
    }
    .ai-help-orb::before,
    .ai-help-orb::after{
      content:"";
      position:absolute;
      border-radius:50%;
      border:1px solid rgba(103,232,249,.55);
    }
    .ai-help-orb::before{inset:10px}
    .ai-help-orb::after{inset:20px;border-color:rgba(255,255,255,.65)}
    .ai-help-orb span{
      width:14px;
      height:14px;
      border-radius:50%;
      background:#67e8f9;
      box-shadow:0 0 18px rgba(103,232,249,.95);
      animation:aiCorePulse 2.8s ease-in-out infinite;
    }
    .ai-help-copy{position:relative;z-index:1;display:grid;gap:6px}
    .ai-help-kicker{
      display:inline-flex;
      align-items:center;
      gap:8px;
      width:max-content;
      padding:5px 10px;
      border-radius:999px;
      background:rgba(255,255,255,.12);
      border:1px solid rgba(255,255,255,.16);
      font-size:11px;
      font-weight:800;
      letter-spacing:.08em;
    }
    .ai-help-kicker::before{
      content:"";
      width:8px;
      height:8px;
      border-radius:50%;
      background:#67e8f9;
      box-shadow:0 0 10px rgba(103,232,249,.9);
    }
    .ai-help-title{
      font-size:18px;
      font-weight:900;
      line-height:1.5;
    }
    .ai-help-subtitle{
      color:rgba(255,255,255,.82);
      font-size:13px;
      font-weight:700;
      line-height:1.9;
    }
    .ai-help-grid{
      display:grid;
      grid-template-columns:repeat(2, minmax(0,1fr));
      gap:14px;
    }
    .ai-help-section{
      position:relative;
      overflow:hidden;
      border:1px solid rgba(148,163,184,.24);
      border-radius:16px;
      padding:16px;
      background:linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
      box-shadow:0 10px 28px rgba(15,23,42,.07);
    }
    .ai-help-section::before{
      content:"";
      position:absolute;
      inset:0 auto 0 0;
      width:4px;
      background:linear-gradient(180deg, #22d3ee, #0369a1);
    }
    .ai-help-section-head{
      display:flex;
      align-items:center;
      gap:10px;
      margin-bottom:10px;
      font-size:15px;
      font-weight:900;
      color:var(--ink);
    }
    .ai-help-chip-icon{
      width:34px;
      height:34px;
      border-radius:11px;
      display:grid;
      place-items:center;
      background:linear-gradient(135deg, rgba(8,145,178,.16), rgba(14,165,233,.08));
      color:var(--brand2);
      border:1px solid rgba(8,145,178,.2);
      font-size:16px;
    }
    .ai-help-body{
      color:var(--ink-soft);
      font-size:14px;
      font-weight:700;
      line-height:1.95;
    }
    .ai-help-body ul,
    .ai-help-body ol{margin:0;padding-right:18px}
    @media (max-width: 720px){
      .ai-help-hero{flex-direction:column;align-items:flex-start;padding:16px}
      .ai-help-grid{grid-template-columns:1fr}
      .ai-help-orb{width:64px;height:64px;border-radius:18px}
    }
    @keyframes aiPulse{0%{box-shadow:0 0 0 0 rgba(8,145,178,.28)}70%{box-shadow:0 0 0 10px rgba(8,145,178,0)}100%{box-shadow:0 0 0 0 rgba(8,145,178,0)}}
    @keyframes aiWake{0%{transform:scale(1) rotate(0)}35%{transform:scale(1.08) rotate(-8deg)}70%{transform:scale(.96) rotate(8deg)}100%{transform:scale(1) rotate(0)}}
    @keyframes aiCorePulse{0%,100%{transform:scale(.92);box-shadow:0 0 14px rgba(103,232,249,.72)}50%{transform:scale(1.14);box-shadow:0 0 26px rgba(103,232,249,.98)}}
    @keyframes aiHeroFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
    @keyframes aiPanelReveal{0%{opacity:0;transform:translateY(8px) scale(.985)}100%{opacity:1;transform:translateY(0) scale(1)}}
    button:focus, .btn:focus{outline:none}
    button:focus-visible, .btn:focus-visible, a:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

    .branches{display:grid; gap:16px;}
    .branch{border:1px solid var(--line); border-radius:16px; background:var(--card); overflow:hidden; transition: var(--transition);}
    .branch:hover{border-color:var(--line);box-shadow: var(--shadow-sm)}
    .branchHead{
      display:flex; align-items:center; justify-content:flex-end; gap:12px;
      padding:14px 16px;
      background: linear-gradient(180deg, var(--line-soft), var(--card));
      border-bottom:1px solid var(--line);
    }
    .btag{font-size:12px;padding:6px 12px;border-radius:10px;font-weight:800;border:1px solid;white-space:nowrap;}
    .btag.easy{background:var(--good-bg);border-color:rgba(5,150,105,.25);color:var(--good)}
    .btag.med{background:var(--warn-bg);border-color:rgba(217,119,6,.25);color:var(--warn)}
    .btag.hard{background:var(--bad-bg);border-color:rgba(220,38,38,.25);color:var(--bad)}
    .branchBody{padding:16px 18px 18px; line-height:1.85; font-size:15px; font-weight:600; color:var(--ink-soft)}

    .parts{display:grid; gap:12px; margin-top:16px;}
    .part{
      border:1px solid var(--line);
      border-radius:14px;
      padding:14px 16px;
      display:flex;
      gap:14px;
      align-items:center;
      justify-content:center;
      background: var(--bg-warm);
    }
    .part .label{font-weight:800;color:var(--ink);line-height:1.5;min-width:0;font-size:14px}
    .part .inputWrap{display:flex; gap:10px; align-items:center; justify-content:flex-end; flex:0 0 auto;}
    input[type="text"], input[type="number"], textarea, select{
      border:2px solid var(--line);
      border-radius:12px;
      padding:12px 14px;
      font-size:15px;
      min-width:180px;
      outline:none;
      transition: var(--transition);
      background:var(--card);
      font-family:var(--font);
      font-weight:700;
      color:var(--ink);
    }
    textarea{min-width:260px; min-height:90px; resize:vertical}
    input:focus, textarea:focus, select:focus{
      border-color:var(--brand);
      box-shadow: 0 0 0 3px rgba(3,105,161,.15);
    }
    .branchBtns{display:flex; gap:10px; flex-wrap:wrap; margin-top:14px; justify-content:flex-start}

    .side{padding:20px;}
    .side .head{display:flex; align-items:center; justify-content:center; gap:12px; margin-bottom:14px;}
    .side .head h3{margin:0; font-size:18px; font-weight:900; color:var(--ink);}
    .progress{height:12px;background:var(--line);border-radius:999px;overflow:hidden;}
    .progress > div{height:100%;width:0%;background:linear-gradient(90deg,var(--accent),var(--brand));border-radius:999px;transition:.4s width ease-out;}
    .qList{margin-top:14px;display:flex;flex-direction:column;gap:10px;}
    .qItem{
      border:2px solid var(--line);
      border-radius:14px;
      padding:12px 14px;
      display:flex; align-items:center; gap:12px;
      background:var(--card);
      cursor:pointer;
      transition: var(--transition);
    }
    .qItem:hover{
      border-color:var(--brand);
      transform:translateX(-2px);
      box-shadow: var(--shadow-sm);
    }
    .qItem.active{border-color:var(--brand); background:var(--brand-light); box-shadow: 0 0 0 2px rgba(3,105,161,.2)}
    .qItem .left{display:flex; align-items:center; gap:12px; min-width:0;}
    .dot{width:10px;height:10px;border-radius:50%;background:var(--muted); flex-shrink:0;}
    .dot.done{background:var(--good)}
    .dot.bad{background:var(--bad)}
    .qItem .name{font-weight:800;line-height:1.3;min-width:0;font-size:13px; color:var(--ink)}
    .icon{
      width:38px;height:38px;border-radius:12px;
      display:grid;place-items:center;
      background: var(--brand-light);
      border:1px solid rgba(3,105,161,.2);
      color:var(--brand);
      font-weight:900;
      flex:0 0 auto;
      font-size:15px;
    }
    .badge{
      font-size:11px;
      padding:5px 10px;
      border-radius:8px;
      font-weight:800;
      border:1px solid;
      white-space:nowrap;
    }
    .badge.warn{background:var(--warn-bg);border-color:rgba(217,119,6,.3);color:var(--warn)}
    .badge.good{background:var(--good-bg);border-color:rgba(5,150,105,.3);color:var(--good)}

    .resultWrap{padding:20px;}
    .scoreCard{
      border:2px solid var(--line);
      border-radius:18px;
      padding:20px;
      background: linear-gradient(180deg, var(--line-soft), var(--card));
      box-shadow: var(--shadow-sm);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      flex-wrap:wrap;
      margin-bottom:16px;
    }
    .scoreBig{font-size:20px;font-weight:900;color:var(--ink)}
    .scoreSub{font-size:13px;font-weight:600;color:var(--muted);margin-top:4px}
    .resultCard{border:1px solid var(--line);border-radius:18px; image-rendering:auto;background:#fff;padding:14px;margin-top:12px;}
    .resultCard .rt{display:flex; align-items:center; justify-content:center;
      position:relative; gap:10px; flex-wrap:wrap; margin-bottom:8px;}
    .tag{font-size:12px;padding:6px 10px;border-radius:999px;font-weight:900;border:1px solid;}
    .tag.good{background:#effaf4;border-color:#cfeedd;color:#0b7a43}
    .tag.bad{background:#ffecec;border-color:#ffd1d1;color:#b42318}
    .partRow{
      display:grid;
      grid-template-columns: 1.15fr .9fr .95fr;
      gap:8px;
      padding:10px;
      border-radius:14px;
      border:1px solid #eef4fb;
      background:#fbfdff;
      margin-top:8px;
      font-size:13px;
    }
    .partRow b{font-weight:900}

    .modal{position:fixed;inset:0;background:rgba(15,23,42,.5);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;padding:20px;z-index:100;}
    .modal.show{display:flex;animation:modalFadeIn .2s ease}
    @keyframes modalFadeIn{from{opacity:0}to{opacity:1}}

    }
    .wrap > section.card{
      grid-area:main;
      margin-top:0;
    }
    .side{
      grid-area:titles;
      position:static;
      top:auto;
      align-self:start;
      margin-top:0;
    }
    .aiResultsRail{
      grid-area:results;
      position:static;
      top:auto;
      align-self:start;
      padding:20px;
      margin-top:0;
    }
    .aiModelsPanel{
      display:grid;
      gap:14px;
      margin:0;
    }
    .aiModelsHero{
      position:relative;
      overflow:hidden;
      border-radius:22px;
      padding:18px;
      color:#fff;
      background:
        radial-gradient(circle at 16% 20%, rgba(56,189,248,.28), transparent 24%),
        radial-gradient(circle at 88% 18%, rgba(96,165,250,.22), transparent 26%),
        linear-gradient(135deg, var(--brand2) 0%, #0f172a 50%, var(--brand) 100%);
      box-shadow:0 18px 34px rgba(15,23,42,.16);
      border:1px solid rgba(255,255,255,.12);
      display:grid;
      gap:14px;
    }
    .aiModelsHero::after{
      content:"";
      position:absolute;

      opacity:.38;

    .aiModelsHeroTop{
      position:relative;
      z-index:1;
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:14px;
    }
    .aiModelsCopy{
      display:grid;
      gap:6px;
      min-width:0;
      flex:1 1 auto;
    }
    .aiModelsBadge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      width:max-content;
      padding:5px 10px;
      border-radius:999px;
      background:rgba(255,255,255,.12);
      border:1px solid rgba(255,255,255,.14);
      font-size:11px;
      font-weight:900;

    .aiModelsBadge::before{

      height:8px;
      border-radius:50%;

      box-shadow:0 0 12px rgba(103,232,249,.9);

    .aiModelsTitle{

      font-weight:900;

    }
    .aiModelsOrb{
      width:76px;
      height:76px;
      border-radius:24px;
      flex:0 0 auto;
      display:grid;
      place-items:center;
      position:relative;
      border:1px solid rgba(255,255,255,.2);
      background:linear-gradient(135deg, rgba(255,255,255,.22), rgba(255,255,255,.08));
      box-shadow:inset 0 1px 0 rgba(255,255,255,.16), 0 14px 28px rgba(8,145,178,.24);
    }
    .aiModelsOrb::before,
    .aiModelsOrb::after{
      content:"";
      position:absolute;
      border-radius:50%;
      border:1px solid rgba(103,232,249,.55);
    }
    .aiModelsOrb::before{ inset:10px; }
    .aiModelsOrb::after{ inset:22px; border-color:rgba(255,255,255,.7); }
    .aiModelsOrb span{
      width:16px;
      height:16px;
      border-radius:50%;
      background:#67e8f9;
      box-shadow:0 0 18px rgba(103,232,249,.95);
      animation:aiModelsPulse 2.8s ease-in-out infinite;
    }
    .aiModelsChips{
      position:relative;
      z-index:1;
      display:flex;
      flex-wrap:wrap;
      gap:8px;
    }
    .aiModelsChip{
      font-size:11px;
      font-weight:900;
      padding:5px 10px;
      border-radius:999px;
      background:rgba(255,255,255,.1);
      border:1px solid rgba(255,255,255,.14);
      color:#eff6ff;
    }
    .aiModelsGrid{
      display:grid;
      grid-template-columns:repeat(2, minmax(0,1fr));
      gap:12px;
    }
    .aiModelCard{
      position:relative;
      overflow:hidden;
      border-radius:18px;
      border:1px solid var(--line);
      background:linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
      padding:14px;
      box-shadow:0 10px 24px rgba(15,23,42,.07);
    }
    .aiModelCard::before{
      content:"";
      position:absolute;
      inset:0 auto 0 0;
      width:4px;
      background:linear-gradient(180deg, #38bdf8, var(--brand));
    }
    .aiModelHead{
      display:flex;
      align-items:center;
      gap:10px;
      margin-bottom:8px;
    }
    .aiModelIcon{
      width:34px;
      height:34px;
      border-radius:12px;
      flex:0 0 auto;
      display:grid;
      place-items:center;
      background:linear-gradient(135deg, rgba(3,105,161,.14), rgba(14,165,233,.08));
      border:1px solid rgba(3,105,161,.14);
      color:var(--brand2);
      font-size:11px;
      font-weight:900;
    }
    .aiModelName{
      font-size:13px;
      font-weight:900;
      color:var(--ink);
      line-height:1.5;
    }
    .aiModelValue{
      font-size:24px;
      font-weight:900;
      color:var(--brand2);
      line-height:1.1;
    }
    .aiModelMeta{
      margin-top:6px;
      font-size:11px;
      font-weight:800;
      color:var(--muted);
      line-height:1.7;
    }
    .aiModelCard.full{
      grid-column:1 / -1;
    }
    .aiTopicBoard,
    .aiInferenceCard{
      border-radius:18px;
      border:1px solid var(--line);
      background:linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
      padding:14px;
      box-shadow:0 10px 24px rgba(15,23,42,.06);
    }
    .aiSectionTitle{
      font-size:14px;
      font-weight:900;
      color:var(--ink);
      margin-bottom:10px;
    }
    .aiTopicList{
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .aiTopicRow{
      display:grid;
      grid-template-columns:auto 1fr auto;
      gap:8px;
      align-items:center;
    }
    .aiTopicName{
      font-size:11px;
      font-weight:900;
      color:#24455f;
    }
    .aiTopicBar{
      height:8px;
      border-radius:999px;
      border:1px solid #dbe7f2;
      background:#edf4fb;
      overflow:hidden;
    }
    .aiTopicFill{
      height:100%;
      background:linear-gradient(90deg, var(--brand), #38bdf8);
      border-radius:inherit;
    }
    .aiTopicPct{
      font-size:11px;
      font-weight:900;
      color:var(--brand2);
      min-width:40px;
      text-align:left;
      direction:ltr;
    }
    .aiInferenceText{
      font-size:13px;
      font-weight:800;
      line-height:1.9;
      color:#334155;
    }
    .aiInferenceHint{
      margin-top:8px;
      font-size:11px;
      font-weight:900;
      color:var(--muted);
    }
    @media (max-width: 980px){
      .wrap{
        grid-template-columns:1fr;
        grid-template-areas:
          "main"
          "results"
          "titles";
      }
      .wrap > section.card,
      .wrap > .side,
      .wrap > .aiResultsRail{
        grid-area:auto;
      }
      .side{
        position:static;
        top:auto;
      }
      .aiResultsRail{
        position:static;
        top:auto;
      }
      .aiModelsGrid{
        grid-template-columns:repeat(2, minmax(0,1fr));
      }
    }
    @media (max-width: 640px){
      .aiModelsHeroTop{
        flex-direction:column;
        align-items:flex-start;
      }
      .aiModelsOrb{
        width:66px;
        height:66px;
        border-radius:20px;
      }
      .aiModelsGrid{
        grid-template-columns:1fr;
      }
    }
    @keyframes aiModelsPulse{
      0%,100%{transform:scale(.92);box-shadow:0 0 14px rgba(103,232,249,.72)}
      50%{transform:scale(1.14);box-shadow:0 0 26px rgba(103,232,249,.98)}
    }
/* Codex AI Models Panel End */







/* ═══════════════════════════════════════════════
   تصميم جامعي — نظام ألوان رسمي
═══════════════════════════════════════════════ */
:root{
  --uni-gold: #C8972A;
  --uni-gold-light: #FDF6E3;
  --uni-gold-border: rgba(200,151,42,.25);
  --uni-green: #1a6b3c;
}

/* شريط علوي — هوية أكاديمية */
.topbar{
  background:linear-gradient(135deg,#0b3c5d 0%,#154360 40%,#0d3349 100%) !important;
  border-bottom:3px solid var(--uni-gold);
}
.topbar.scrolled{
  box-shadow:0 4px 30px rgba(11,60,93,.45) !important;
}

/* شريط ذهبي دقيق تحت الـ topbar */
.topbar::after{
  content:"";
  position:absolute;
  bottom:-3px; left:0; right:0;
  height:3px;
  background:linear-gradient(90deg,transparent,var(--uni-gold),transparent);
  opacity:.6;
}

/* Cards — حدود أكاديمية */
.card{
  border-top:3px solid var(--brand) !important;
  border-radius:18px;
}

/* Section titles — طراز أكاديمي */
.mainhead{
  background:linear-gradient(180deg,#f0f7ff 0%,#ffffff 100%);
  border-bottom:2px solid var(--uni-gold-border);
}
.mainhead::after{
  content:"";
  display:block;
  position:absolute;
  bottom:0; left:20px; right:20px;
  height:1px;
  background:linear-gradient(90deg,transparent,var(--uni-gold),transparent);
  opacity:.5;
}
.mainhead{ position:relative; }

/* شارة الجامعة على السؤال */
.pill{
  background:linear-gradient(135deg,var(--uni-gold-light),#fff8e7);
  color:#8B6914;
  border-color:var(--uni-gold-border);
  font-weight:900;
}

/* ═══════════════════════════════════════════════
   تحسين شاشة الإجابة الصحيحة
═══════════════════════════════════════════════ */
.choice.goodField{
  background:linear-gradient(135deg,#f0fdf4 0%,#dcfce7 100%) !important;
  border-color:#16a34a !important;
  border-width:2px !important;
  color:#15803d !important;
  box-shadow:0 0 0 4px rgba(22,163,74,.12), 0 4px 14px rgba(22,163,74,.1) !important;
  position:relative;
}
.choice.goodField::after{
  content:"✓ صحيح";
  position:absolute;
  left:14px; top:50%;
  transform:translateY(-50%);
  font-size:11px;font-weight:900;
  color:#15803d;
  background:#dcfce7;
  padding:3px 8px;border-radius:6px;
  border:1px solid rgba(22,163,74,.3);
}
.choice.badField{
  background:linear-gradient(135deg,#fff5f5 0%,#fee2e2 100%) !important;
  border-color:#dc2626 !important;
  border-width:2px !important;
  color:#b91c1c !important;
  box-shadow:0 0 0 4px rgba(220,38,38,.1) !important;
  position:relative;
}
.choice.badField::after{
  content:"✗ خطأ";
  position:absolute;
  left:14px; top:50%;
  transform:translateY(-50%);
  font-size:11px;font-weight:900;
  color:#b91c1c;
  background:#fee2e2;
  padding:3px 8px;border-radius:6px;
  border:1px solid rgba(220,38,38,.25);
}
input.goodField, textarea.goodField{
  border-color:#16a34a !important;
  background:linear-gradient(135deg,#f0fdf4,#dcfce7) !important;
  box-shadow:0 0 0 3px rgba(22,163,74,.15) !important;
}
input.badField, textarea.badField{
  border-color:#dc2626 !important;
  background:linear-gradient(135deg,#fff5f5,#fee2e2) !important;
  box-shadow:0 0 0 3px rgba(220,38,38,.12) !important;
}

/* ═══════════════════════════════════════════════
   تطوير صفحة النتائج
═══════════════════════════════════════════════ */
.scoreCard{
  border-radius:20px !important;
  background:linear-gradient(135deg,#0b3c5d 0%,#154360 60%,#1a6b3c 100%) !important;
  border:none !important;
  color:#fff !important;
  padding:24px !important;
  box-shadow:0 20px 40px rgba(11,60,93,.25) !important;
  position:relative;
  overflow:hidden;
}
.scoreCard::before{
  content:"";
  position:absolute;
  inset:0;
  background:repeating-linear-gradient(90deg,rgba(255,255,255,.04) 0 1px,transparent 1px 20px);
  pointer-events:none;
}
.scoreCard::after{
  content:"";
  position:absolute;
  bottom:0; left:0; right:0;
  height:4px;
  background:linear-gradient(90deg,var(--uni-gold),#fde68a,var(--uni-gold));
}
.scoreBig{
  font-size:24px !important;
  font-weight:900 !important;
  color:#fff !important;
  position:relative;
}
.scoreSub{ color:rgba(255,255,255,.8) !important; position:relative; }
.score-bar-wrap{
  background:rgba(255,255,255,.15) !important;
  height:10px !important;
  border-radius:999px;
  position:relative;
}
.score-bar-correct{
  background:linear-gradient(90deg,#34d399,#a7f3d0) !important;
}

/* بطاقات النتائج */
.resultCard{
  border-radius:16px !important;
  border:1px solid var(--line) !important;
  box-shadow:0 4px 16px rgba(15,23,42,.06) !important;
  overflow:hidden;
  transition:var(--transition);
}
.resultCard:hover{
  border-color:var(--brand) !important;
  box-shadow:0 8px 24px rgba(3,105,161,.1) !important;
  transform:translateY(-1px);
}
/* رأس بطاقة النتيجة */
.resultCard > div:first-child{
  background:linear-gradient(180deg,#f8fbff 0%,#ffffff 100%);
  padding:14px 16px 12px !important;
  border-bottom:1px solid var(--line);
  margin-bottom:0 !important;
}

.tag.good{
  background:linear-gradient(135deg,#dcfce7,#f0fdf4) !important;
  border-color:rgba(22,163,74,.3) !important;
  color:#15803d !important;
  font-weight:900;
  padding:6px 14px;
}
.tag.bad{
  background:linear-gradient(135deg,#fee2e2,#fff5f5) !important;
  border-color:rgba(220,38,38,.3) !important;
  color:#b91c1c !important;
  font-weight:900;
  padding:6px 14px;
}

/* صفوف الأجزاء */
.partRow{
  border-radius:10px !important;
  border:1px solid var(--line) !important;
  background:#f8fbff !important;
  padding:12px 16px !important;
  font-size:13px;
  transition:var(--transition);
}
.partRow:hover{ background:#eef6ff !important; border-color:rgba(3,105,161,.2) !important; }

/* أزرار النتيجة */
.scoreCard .btn.primary{
  background:linear-gradient(135deg,var(--uni-gold),#b07d20) !important;
  border:none !important;
  box-shadow:0 4px 14px rgba(200,151,42,.35) !important;
  color:#fff !important;
  position:relative;
}
.scoreCard .btn.primary:hover{
  background:linear-gradient(135deg,#d4a43a,var(--uni-gold)) !important;
  transform:translateY(-2px) !important;
  box-shadow:0 8px 20px rgba(200,151,42,.45) !important;
}
:root{
  --shadow-sm: 0 1px 2px rgba(15,23,42,.04), 0 2px 8px rgba(15,23,42,.06);
  --shadow:    0 4px 6px rgba(15,23,42,.04), 0 10px 28px rgba(15,23,42,.08);
  --shadow-lg: 0 20px 25px rgba(15,23,42,.08), 0 40px 60px rgba(15,23,42,.12);
}
/* Topbar — Glass أقوى */
.topbar{
  backdrop-filter:blur(20px) saturate(180%);
  -webkit-backdrop-filter:blur(20px) saturate(180%);
  border-bottom:1px solid rgba(255,255,255,.1);
}
/* Scroll-linked shadow على الـ topbar */
.topbar.scrolled{ box-shadow:0 4px 30px rgba(15,23,42,.3); }

/* Cards — ضلع علوي ملون + hover أجمل */
.card{ border-top:3px solid var(--brand); }
.card:hover{ box-shadow:0 12px 36px rgba(15,23,42,.11); transform:translateY(-1px); }

/* Progress bar — shimmer متحرك */
.progress{
  height:8px;
  box-shadow:inset 0 1px 3px rgba(0,0,0,.07);
}
.progress > div{
  background-size:200% 100%;
  animation:progressShimmer 2.4s linear infinite;
  background-image:linear-gradient(90deg, #0369a1 0%, #38bdf8 50%, #0369a1 100%);
}
@keyframes progressShimmer{
  0%{background-position:100% 0}
  100%{background-position:-100% 0}
}

/* Question number badge */
.qtitle .qnum{
  background:linear-gradient(135deg, var(--brand), var(--brand2));
  color:#fff;
  border:none;
  box-shadow:0 6px 16px rgba(3,105,161,.3);
  font-size:17px;
  width:44px; height:44px;
  border-radius:14px;
}

/* MCQ choices — تحسين التفاعل */
.choice{
  position:relative;
  transition:all .2s cubic-bezier(.4,0,.2,1);
  border-width:2px;
}
.choice:hover{ transform:translateX(-3px); box-shadow:0 4px 14px rgba(3,105,161,.12); }
.choice.goodField{
  box-shadow:0 0 0 3px rgba(5,150,105,.18);
  animation:correctPop .3s ease;
}
.choice.badField{ box-shadow:0 0 0 3px rgba(220,38,38,.15); }
@keyframes correctPop{
  0%{transform:scale(1)}
  50%{transform:scale(1.02)}
  100%{transform:scale(1)}
}

/* Difficulty tags */
.btag{ letter-spacing:.04em; text-transform:uppercase; font-size:11px; border-radius:8px; }

/* Timer */
.timerBar{
  font-variant-numeric:tabular-nums;
  letter-spacing:.06em;
  font-size:16px;
  padding:8px 18px;
  background:rgba(255,255,255,.15);
  border:1px solid rgba(255,255,255,.3);
  border-radius:14px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.2);
}

/* AI Model cards — hover مع خط سفلي */
.aiModelCard{
  transition:transform .2s, box-shadow .2s;
  cursor:default;
}
.aiModelCard::after{
  content:"";
  position:absolute;
  bottom:0; left:0; right:0;
  height:3px;
  background:linear-gradient(90deg, var(--brand), #38bdf8);
  transform:scaleX(0);
  transition:transform .3s;
  transform-origin:right;
  border-radius:0 0 4px 4px;
}
.aiModelCard:hover{ transform:translateY(-2px); box-shadow:0 10px 28px rgba(15,23,42,.1); }
.aiModelCard:hover::after{ transform:scaleX(1); }

/* ═══════════════════════════════════════════════
   النماذج الخمسة الجديدة — CSS
═══════════════════════════════════════════════ */

/* قسم النماذج الموسّع */
.aiExtSection{
  border-radius:18px;
  border:1px solid var(--line);
  background:linear-gradient(180deg,#ffffff 0%,#f8fbff 100%);
  padding:16px;
  box-shadow:0 10px 24px rgba(15,23,42,.06);
  display:grid;
  gap:12px;
}

/* ١. منحنى النسيان */
.forgettingCard{
  display:grid;
  gap:10px;
}
.forgettingTopicRow{
  display:grid;
  grid-template-columns:auto 1fr auto auto;
  gap:8px;
  align-items:center;
}
.forgettingTopicName{font-size:11px;font-weight:900;color:#24455f}
.forgettingBar{height:8px;border-radius:999px;border:1px solid #dbe7f2;background:#edf4fb;overflow:hidden;}
.forgettingFill{height:100%;border-radius:inherit;transition:width .5s ease;}
.forgettingPct{font-size:11px;font-weight:900;min-width:36px;text-align:left;direction:ltr;}
.forgettingReview{
  font-size:10px;font-weight:900;padding:3px 7px;border-radius:6px;white-space:nowrap;
}
.forgettingReview.now{background:#fee2e2;color:#dc2626;border:1px solid rgba(220,38,38,.2)}
.forgettingReview.soon{background:#fef3c7;color:#d97706;border:1px solid rgba(217,119,6,.2)}
.forgettingReview.ok{background:#d1fae5;color:#059669;border:1px solid rgba(5,150,105,.2)}

/* ٢. IRT — قدرة الطالب */
.irtCard{
  display:grid;
  gap:12px;
}
.irtTheta{
  display:flex;
  align-items:center;
  gap:14px;
}
.irtThetaNum{
  font-size:28px;
  font-weight:900;
  color:var(--brand2);
  direction:ltr;
  white-space:nowrap;
}
.irtThetaSub{font-size:12px;font-weight:800;color:var(--muted);line-height:1.6}
.irtScale{
  position:relative;
  height:12px;
  border-radius:999px;
  background:linear-gradient(90deg,#dc2626 0%,#d97706 25%,#0369a1 50%,#059669 75%,#0284c7 100%);
  overflow:visible;
  margin:4px 0;
}
.irtPointer{
  position:absolute;
  top:50%;
  transform:translate(-50%,-50%);
  width:18px;height:18px;
  border-radius:50%;
  background:#fff;
  border:3px solid var(--brand);
  box-shadow:0 2px 8px rgba(3,105,161,.35);
  transition:left .5s ease;
}
.irtLabels{
  display:flex;
  justify-content:space-between;
  font-size:10px;
  font-weight:900;
  color:var(--muted);
  direction:ltr;
}
.irtSE{
  font-size:11px;
  font-weight:800;
  color:var(--muted);
  background:#f1f5f9;
  border-radius:8px;
  padding:6px 10px;
  text-align:center;
}

/* ٣. محلل نمط الأخطاء */
.errorPatternCard{display:grid;gap:10px}
.errorTypeRow{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;border-radius:12px;
  border:1px solid var(--line);
  background:#f8fbff;
}
.errorTypeBadge{
  font-size:11px;font-weight:900;padding:4px 10px;border-radius:8px;white-space:nowrap;
}
.errorTypeBadge.conceptual{background:#fee2e2;color:#dc2626;border:1px solid rgba(220,38,38,.2)}
.errorTypeBadge.computational{background:#fef3c7;color:#d97706;border:1px solid rgba(217,119,6,.2)}
.errorTypeBadge.application{background:#ede9fe;color:#7c3aed;border:1px solid rgba(124,58,237,.2)}
.errorTypeBadge.none{background:#d1fae5;color:#059669;border:1px solid rgba(5,150,105,.2)}

/* ===== أدوات عشوائية (Seeded RNG) ===== */
function xmur3(str){
  let h = 1779033703 ^ str.length;
  for (let i = 0; i < str.length; i++) {
    h = Math.imul(h ^ str.charCodeAt(i), 3432918353);
    h = (h << 13) | (h >>> 19);
  }
  return function(){
    h = Math.imul(h ^ (h >>> 16), 2246822507);
    h = Math.imul(h ^ (h >>> 13), 3266489909);
    return (h ^= h >>> 16) >>> 0;
  }
}
function mulberry32(a){
  return function(){
    let t = a += 0x6D2B79F5;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  }
}
function seededRand(seedStr){
  const seed = xmur3(seedStr)();
  return mulberry32(seed);
}
function randInt(r, lo, hi){ return Math.floor(r()*(hi-lo+1))+lo; }
function gcd(a,b){ a=Math.abs(a); b=Math.abs(b); while(b){ const t=a%b; a=b; b=t; } return a||1; }
function reduceFrac(n,d){ const g=gcd(n,d); return [n/g, d/g]; }
function fracStr(n,d){ const r=reduceFrac(n,d); return String(r[0])+"/"+String(r[1]); }
function toArabicDigits(x){
  const map = {"0":"٠","1":"١","2":"٢","3":"٣","4":"٤","5":"٥","6":"٦","7":"٧","8":"٨","9":"٩"};
  return String(x).replace(/[0-9]/g, d=>map[d]||d);
}

/* ===== حالة الصفحة (تُحفظ فقط عند ضغط حفظ الإجابة) ===== */
const STATE_KEY = "stat102_5_4_state_v2";
const TIMER_MINUTES = 30;
const TIMER_KEY = "stat102_5_4_timerEnd_v2";
const state = loadState() || { currentIndex: 0, variants: {}, branches: {}, order: null, timerEnded: false, reviewSet: {}, dirty: {}, sidebarFilter: "all", fontSize: 0 };

function saveState(){ localStorage.setItem(STATE_KEY, JSON.stringify(state)); }
function loadState(){ try{ const s = JSON.parse(localStorage.getItem(STATE_KEY)); if(s){ s.timerEnded = !!s.timerEnded; if(!s.reviewSet) s.reviewSet = {}; if(!s.dirty) s.dirty = {}; if(!s.sidebarFilter) s.sidebarFilter = "all"; if(s.sidebarFilter==="review") s.sidebarFilter = "all"; if(s.fontSize==null) s.fontSize = 0; } return s; }catch(e){ return null; } }

let timerInterval = null;
function startTimer(){
  let endAt = null;
  try{ const v = localStorage.getItem(TIMER_KEY); if(v) endAt = parseInt(v,10); }catch(e){}
  if(endAt == null || endAt < Date.now()){
    endAt = Date.now() + TIMER_MINUTES * 60 * 1000;
    localStorage.setItem(TIMER_KEY, String(endAt));
  }
  if(endAt != null && endAt > Date.now()){
    state.timerEnded = false;
    saveState();
    renderAll();
  }
  let oneMinuteWarned = false;
  function tick(){
    if(state.timerEnded) return;
    const rem = Math.max(0, Math.ceil((endAt - Date.now()) / 1000));
    const el = document.getElementById("timerBar");
    if(!el) return;
    const m = Math.floor(rem/60), s = rem % 60;
    el.textContent = "الوقت المتبقي: " + m + ":" + (s<10?"0":"") + s;
    el.classList.remove("warn","done");
    if(rem <= 60) el.classList.add("warn");
    if(rem === 60 && !oneMinuteWarned){ oneMinuteWarned = true; openModal("تنبيه", "<p style=\"font-weight:800\">دقيقة واحدة متبقية — احفظ إجاباتك إن لم تكن محفوظة.</p>"); }
    if(rem === 0){
      if(timerInterval) clearInterval(timerInterval);
      timerInterval = null;
      window.__examRunning = false;
      state.timerEnded = true;
      saveState();
      el.textContent = "انتهى الوقت";
      el.classList.add("done");
      showResultsModal();
      renderAll();
    }
  }
  tick();
  if(timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(tick, 1000);
}
function isExamStarted(){
  try{ const v = localStorage.getItem(TIMER_KEY); if(!v) return false; const endAt = parseInt(v,10); return endAt > Date.now(); }catch(e){ return false; }

const SVG_TAGS = new Set(["svg","g","path","rect","line","circle","text","defs","linearGradient","stop","polyline","polygon"]);
function el(tag, attrs={}, children=[]){
  const isSvg = SVG_TAGS.has(String(tag).toLowerCase());
  const node = isSvg ? document.createElementNS("http://www.w3.org/2000/svg", tag) : document.createElement(tag);
  Object.entries(attrs).forEach(([k,v])=>{
    if(k==="class") node.className=v;
    else if(k==="html") node.innerHTML=v;
    else if(k.startsWith("on") && typeof v==="function") node.addEventListener(k.slice(2), v);
    else if(k==="disabled") node.disabled=!!v;
    else node.setAttribute(k,v);
  });
  (Array.isArray(children)?children:[children]).forEach(ch=>{
    if(ch===null || ch===undefined) return;
    node.appendChild(typeof ch==="string" ? document.createTextNode(ch) : ch);
  });
  return node;
}
function escapeHtml(s){ return String(s).replace(/[&<>"']/g, m=>({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[m])); }
function normalizeText(s){ if(s==null) return ""; return String(s).trim().replace(/\s+/g," ").replace(/[ظھ%]/g,"%"); }
function parseNumberLoose(v){
  if(v==null) return NaN;
  const s = String(v).replace(/[٬،]/g,",").replace(/[%٪]/g,"").trim();
  if(!s) return NaN;
  const n = Number(s);
  return Number.isFinite(n) ? n : NaN;
}
function nearlyEqual(a,b,eps=1e-2){
  if(a==null||b==null) return false;
  if(!Number.isFinite(a) || !Number.isFinite(b)) return false;
  return Math.abs(a-b) <= eps;
}
function roundTo(x, d=2){
  const n = Number(x);
  if(!Number.isFinite(n)) return String(x);
  const m = Math.pow(10,d);
  return (Math.round(n*m)/m).toFixed(d);
}
function formatNumber(x){
  const n = Number(x);
  if(!Number.isFinite(n)) return String(x);
  if(Math.abs(n - Math.round(n)) < 1e-9) return String(Math.round(n));
  return roundTo(n, 2);
}
function parseNumberList(s){
  if(s==null) return [];
  const raw = String(s).replace(/[،]/g, ",").trim();
  if(!raw) return [];
  return raw.split(",").map(x=>x.trim()).filter(Boolean).map(x=>Number(x)).filter(x=>Number.isFinite(x)).sort((a,b)=>a-b);
}
function sameNumberList(a,b){
  const A=parseNumberList(a), B=parseNumberList(b);
  if(A.length!==B.length) return false;
  for(let i=0;i<A.length;i++){
    if(Math.abs(A[i]-B[i])>1e-9) return false;
  }
  return true;
}

function latexFix(s){
  if(s==null) return "";
  // Reduce doubled backslashes produced by JS string escaping
  return String(s).replace(/\\\\/g, "\\");
}

function latexToText(expr){
  let s = String(expr||"");
  s = s.replace(/\\Omega/g,"Ω")
       .replace(/\\phi|\\varnothing/g,"âˆ…")
       .replace(/\\cap/g,"âˆ©")
       .replace(/\\cup/g,"∪")
       .replace(/\\subseteq/g,"⊆")
       .replace(/\\subset/g,"⊂")
       .replace(/\\setminus/g,"\\")
       .replace(/\\to/g,"â†’")
       .replace(/\\infty/g,"âˆ‍");
  // overline for single letter: \overline{A} -> Ā
  s = s.replace(/\\overline\{([A-Za-z])\}/g, (_,a)=>a+"\u0305");
  // fraction: \\frac{a}{b} -> (a/b)
  s = s.replace(/\\frac\{([^}]+)\}\{([^}]+)\}/g, "($1/$2)");
  // remove braces and extra backslashes
  s = s.replace(/[{}]/g,"").replace(/\\,/g," ");
  s = s.replace(/\\/g,"");
  return s;
}
function fallbackMathToUnicode(root){
  if(!root) return;
  const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, null);
  const nodes = [];
  while(walker.nextNode()) nodes.push(walker.currentNode);
  nodes.forEach(n=>{
    const t = n.nodeValue;
    if(!t) return;
    let out = t;
    out = out.replace(/\\\((.*?)\\\)/g, (_,inner)=>latexToText(inner));
    out = out.replace(/\\\[(.*?)\\\]/g, (_,inner)=>latexToText(inner));
    n.nodeValue = out;
  });
}
function typesetMath(root){
  if(!root) return;
  try{
    if(window.renderMathInElement){
      window.renderMathInElement(root,{
        delimiters:[
          {left:"\\(", right:"\\)", display:false},
          {left:"\\[", right:"\\]", display:true}
        ],
        throwOnError:false
      });
    }else{
      fallbackMathToUnicode(root);
    }
  }catch(e){
    try{ fallbackMathToUnicode(root); }catch(_){}
  }
  fixMathDir(root);
}

        { pa:0.25, pb:0.40, joint:0.10, ans:"نعم، مستقلان" },
        { pa:0.60, pb:0.30, joint:0.25, ans:"لا، غير مستقلين" }
      ];
      const c = cases[randInt(r,0,cases.length-1)];
      return ({
        branches:[{
          level:"متوسط",
          explain:[
            "نحسب أولًا حاصل ضرب P(A) و P(B).",
            "إذا ساوى هذا الحاصل قيمة P(A∩B) كان الحادثان مستقلين، وإلا فهما غير مستقلين."
          ],
          formula:[
            String.raw`الاستقلال ⇔ \(P(A\cap B)=P(A)P(B)\)`
          ],
          prompt:`إذا كان P(A) = ${c.pa.toFixed(2)} و P(B) = ${c.pb.toFixed(2)} و P(A∩B) = ${c.joint.toFixed(2)}، فهل الحادثان A و B مستقلان؟`,
          parts:[
            { type:"mcq", key:"a", label:"اختر الإجابة الصحيحة:", options:["نعم، مستقلان","لا، غير مستقلين"] }
          ],
          answers:{ a: c.ans },
          solutionSteps:[
            `نحسب P(A)P(B) = ${c.pa.toFixed(2)} × ${c.pb.toFixed(2)} = ${(c.pa*c.pb).toFixed(2)}.`,
            `بمقارنة ذلك مع P(A∩B) = ${c.joint.toFixed(2)} نجد أن الحكم الصحيح هو: ${c.ans}.`
          ]
        }]
      });
    }
  },

  {
    id:"q10_indep_complement",
    title:"5.4 احتمال وقوع A وعدم وقوع B",
    icon:"Ā",
    gen:(seed)=>{
      const r = seededRand("q10_indep_complement|"+seed);
      const vals = [0.20,0.25,0.30,0.40,0.50,0.60,0.70];
      const pa = vals[randInt(r,0,vals.length-1)];
      const pb = vals[randInt(r,0,vals.length-1)];
      const ans = (pa*(1-pb)).toFixed(2);
      let opts = [ans, (pa*pb).toFixed(2), ((1-pa)*pb).toFixed(2), (1-pa*(1-pb)).toFixed(2)];
      opts = Array.from(new Set(opts));
      while(opts.length<4){
        opts.push((randInt(r,5,95)/100).toFixed(2));
        opts = Array.from(new Set(opts));
      }
      opts = opts.slice(0,4);
      shuffleInPlace(opts, r);
      return ({
        branches:[{
          level:"متوسط",
          explain:[
            "إذا كان A و B مستقلين فإن A و متمم B مستقلان أيضًا.",
            String.raw`لذلك \(P(A\cap \overline{B})=P(A)P(\overline{B})=P(A)(1-P(B))\).`
          ],
          formula:[
            String.raw`\(P(A\cap \overline{B})=P(A)\\times (1-P(B))\)`
          ],
          prompt:String.raw`إذا كان \(A\) و \(B\) حادثين مستقلين، وكان \(P(A)=${pa.toFixed(2)}\) و \(P(B)=${pb.toFixed(2)}\)، فاحسب \(P(A\cap \overline{B})\).`,
          parts:[
            { type:"mcq", key:"a", label:"اختر الإجابة الصحيحة:", options: opts }
          ],
          answers:{ a: ans },
          solutionSteps:[
            String.raw`أولًا نحسب \(P(\overline{B}) = 1 - ${pb.toFixed(2)} = ${(1-pb).toFixed(2)}\).`,
            String.raw`وبما أن \(A\) و \(\overline{B}\) مستقلان فإن \(P(A\cap \overline{B}) = P(A)P(\overline{B})\).`,
            `${pa.toFixed(2)} × ${(1-pb).toFixed(2)} = ${ans}.`
          ]
        }]
      });
    }
  }

];

function getVariant(qid){
  const v = state.variants[qid];
  if(typeof v !== "number" || !isFinite(v) || v < 1){
    state.variants[qid] = 1;
    saveState();
  }
  return state.variants[qid];
}
function bumpVariant(qid){
  const cur = getVariant(qid);
  state.variants[qid] = cur + 1;
  saveState();
}

function shuffleInPlace(arr, r){
  for(let i=arr.length-1;i>0;i--){
    const j = Math.floor(r()*(i+1));
    const tmp = arr[i];
    arr[i] = arr[j];
    arr[j] = tmp;
  }
  return arr;
}
function ensureOrder(){
  const ids = TEMPLATES.map(t=>t.id);
  const ok = Array.isArray(state.order)
    && state.order.length === ids.length
    && ids.every(id=>state.order.includes(id));
  if(!ok){
    state.order = [...ids];
    saveState();
  }
  return state.order;
}
function reshuffleOrder(){
  const ids = TEMPLATES.map(t=>t.id);
  const r = seededRand("order|"+Date.now()+"|"+Math.random());
  state.order = shuffleInPlace([...ids], r);
  saveState();
}

function buildQuestionById(id){
  const t = TEMPLATES.find(x=>x.id===id);

}

const MASTERY_VERSION = "stat102_5_4_mastery_v1";
const MASTERY_CORE = ["q1_pool", "q2_cond_die", "q5_without_replacement", "q9_test_independence"];
const MASTERY_PROFILES = {
  q1_pool:{supports:["q2_cond_die", "q4_replacement_cond", "q8_coin_die_indep"]},
  q2_cond_die:{supports:["q3_cond_language", "q5_without_replacement", "q1_pool"]},
  q3_cond_language:{supports:["q2_cond_die", "q9_test_independence", "q10_indep_complement"]},
  q4_replacement_cond:{supports:["q5_without_replacement", "q6_bulbs", "q2_cond_die"]},
  q5_without_replacement:{supports:["q6_bulbs", "q4_replacement_cond", "q10_indep_complement"]},
  q6_bulbs:{supports:["q5_without_replacement", "q7_shooters", "q4_replacement_cond"]},

  q9_test_independence:{supports:["q8_coin_die_indep", "q7_shooters", "q10_indep_complement"]},
  q10_indep_complement:{supports:["q9_test_independence", "q7_shooters", "q5_without_replacement"]}
};

function normalizeAdaptiveOrder(order){
  const ids = TEMPLATES.map(t=>t.id);
  const seen = new Set();
  return (Array.isArray(order) ? order : []).filter(id=>{
    if(!ids.includes(id) || seen.has(id)) return false;
    seen.add(id);
    return true;
  });
}

function ensureAdaptiveState(){
  const ids = TEMPLATES.map(t=>t.id);
  const core = MASTERY_CORE.filter(id=>ids.includes(id));
  let active = normalizeAdaptiveOrder(state.activeOrder);
  if(state.masteryVersion !== MASTERY_VERSION || active.length===0){
    const r = seededRand("mastery-core|" + Date.now() + "|" + Math.random());
    active = shuffleInPlace([...core], r);
    state.masteryVersion = MASTERY_VERSION;
    state.activeOrder = active;
    state.order = active.slice();
    state.masterySupportCount = 0;
    state.masterySupportLog = [];
    state.masterySupportSources = {};
    saveState();
  }else if(active.length !== (state.activeOrder || []).length){
    state.activeOrder = active;
    state.order = active.slice();
    saveState();
  }
  if(state.currentIndex >= state.activeOrder.length){
    state.currentIndex = Math.max(0, state.activeOrder.length - 1);
    saveState();
  }
  return state.activeOrder;
}

function chooseSupportId(qid){
  const active = ensureAdaptiveState();
  const ids = TEMPLATES.map(t=>t.id);
  const pools = [];
  if(qid && MASTERY_PROFILES[qid]) pools.push(MASTERY_PROFILES[qid].supports || []);
  pools.push(MASTERY_CORE.filter(id=>id!==qid));
  pools.push(ids);
  for(const pool of pools){
    for(const id of pool){
      if(ids.includes(id) && !active.includes(id)) return id;
    }
  }
  return null;
}

function addAdaptiveSupportFor(qid, reason){
  const active = ensureAdaptiveState();
  const sourceKey = qid || "general";
  state.masterySupportSources = state.masterySupportSources || {};
  if((state.masterySupportSources[sourceKey] || 0) >= 1) return null;
  const nextId = chooseSupportId(qid);
  if(!nextId) return null;
  active.push(nextId);
  state.activeOrder = active;
  state.order = active.slice();
  state.masterySupportSources[sourceKey] = (state.masterySupportSources[sourceKey] || 0) + 1;
  state.masterySupportCount = (state.masterySupportCount || 0) + 1;
  state.masterySupportLog = state.masterySupportLog || [];
  state.masterySupportLog.push({ source: sourceKey, support: nextId, reason: reason || "mastery", at: Date.now() });
  saveState();
  return nextId;
}

function maybeQueueAdaptiveSupport(question){
  if(!window.__examRunning || !question) return null;
  if(isQuestionWrong(question)) return addAdaptiveSupportFor(question.id, "wrong");
  return null;
}

function ensureSupportForWeakQuestions(){
  if(!window.__examRunning) return false;
  ensureAdaptiveState();
  const activeSet = new Set(state.activeOrder || []);
  const activeQuestions = BANK.filter(q=>activeSet.has(q.id));
  const done = activeQuestions.filter(q=>isQuestionComplete(q));
  const wrong = done.filter(q=>isQuestionWrong(q));
  let added = false;
  wrong.forEach(q=>{ if(addAdaptiveSupportFor(q.id, "locked")) added = true; });
  if(!added && done.length > 0 && done.length === activeQuestions.length && state.activeOrder.length < TEMPLATES.length){
    const correctCount = done.filter(q=>isQuestionCorrect(q)).length;
    const masteryRatio = correctCount / done.length;
    if(masteryRatio < 0.85){
      const anchor = wrong[0] || done.find(q=>!isQuestionCorrect(q)) || done[done.length-1];
      if(addAdaptiveSupportFor(anchor && anchor.id, "mastery-threshold")) added = true;
    }
  }
  if(added) BANK = buildBank();
  return added;
}

function buildBank(){
  const order = ensureAdaptiveState();
  const bank = order.map(buildQuestionById).filter(Boolean);
  if(bank.length) return bank;
  state.activeOrder = TEMPLATES.slice(0, Math.min(3, TEMPLATES.length)).map(t=>t.id);
  state.order = state.activeOrder.slice();
  saveState();
  return state.activeOrder.map(buildQuestionById).filter(Boolean);
}

function collectPartKeys(branch){
  const keys=[];
  (branch.parts||[]).forEach(p=>keys.push(p.key));
  if(branch.customUI==="freqTable" && branch.table && branch.table.rows){
    branch.table.rows.forEach(r=>(r.inputs||[]).forEach(k=>keys.push(k)));
  }
  return keys;
}

/* ===== تقييم فرع ===== */
function gradeBranch(q, branch, bi, savedObj){
  const result = { okAll: true, byKey: {} };

  // parts
  (branch.parts||[]).forEach(p=>{
    const studentRaw = (savedObj && savedObj[p.key] != null) ? savedObj[p.key] : "";
    const correct = branch.answers[p.key];
    let ok=false;
    if(p.type==="mcq"){
      ok = normalizeText(studentRaw) === normalizeText(correct);
    }else if(p.type==="text"){
      if(p.orderInsensitive) ok = sameNumberList(studentRaw, correct);
      else ok = normalizeText(studentRaw) === normalizeText(correct);
    }else{
      ok = nearlyEqual(parseNumberLoose(studentRaw), Number(correct), 1e-2);
    }
    result.byKey[p.key]=ok;
    if(!ok) result.okAll=false;
  });

  // freq table
  if(branch.customUI==="freqTable" && branch.table && branch.table.rows){
    branch.table.rows.forEach(r=>{
      (r.inputs||[]).forEach(k=>{
        const studentRaw = (savedObj && savedObj[k] != null) ? savedObj[k] : "";
        const correct = branch.answers[k];
        const ok = nearlyEqual(parseNumberLoose(studentRaw), Number(correct), 1e-2);
        result.byKey[k]=ok;
        if(!ok) result.okAll=false;
      });
    });
  }

  return result;
}

  const rec = ensureBranchRec(qid, bi);

function isQuestionComplete(q){
  return q.branches.every((b,bi)=>isBranchComplete(q.id, bi));
}
function isQuestionCorrect(q){
  return q.branches.every((b,bi)=>ensureBranchRec(q.id,bi).status==="correct");
}
function isQuestionWrong(q){
  return q.branches.some((b,bi)=>ensureBranchRec(q.id,bi).status==="locked");
}

function piePaths(counts, cx, cy, r){
  const total = counts.reduce((a,b)=>a+b,0);
  let a0 = -Math.PI/2;
  const paths = [];
  for(let i=0;i<counts.length;i++){
    const frac = counts[i]/total;
    const a1 = a0 + frac*2*Math.PI;
    const x0 = cx + r*Math.cos(a0), y0 = cy + r*Math.sin(a0);
    const x1 = cx + r*Math.cos(a1), y1 = cy + r*Math.sin(a1);
    const large = (a1-a0) > Math.PI ? 1 : 0;
    const d = `M ${cx} ${cy} L ${x0} ${y0} A ${r} ${r} 0 ${large} 1 ${x1} ${y1} Z`;
    paths.push({d, frac, a0, a1});
    a0 = a1;
  }
  return paths;
}

/* ===== رسومات: حجر نرد + قطعة نقد ===== */
function renderDiceCoinWidget(){
  let die = 1;
  let coin = "H";
  const info = el("div",{class:"muted", style:"margin-top:8px;font-weight:800"},[`النتيجة المختارة: (${die}, ${coin})`]);

  function makeDieFace(n){
    const active = (n===die);
    const box = el("div",{class:"btn small", style:`width:52px;height:52px;display:flex;align-items:center;justify-content:center;border-radius:14px;border:2px solid ${active?"#0a5ea8":"#b9cde0"};background:${active?"#e8f4ff":"#fff"};font-weight:900;cursor:pointer;`},[String(n)]);
    box.addEventListener("click", ()=>{
      die=n;
      update();
    });
    return box;
  }
  function makeCoinSide(lbl){
    const active = (lbl===coin);
    const c = el("div",{class:"btn small", style:`width:70px;height:52px;display:flex;align-items:center;justify-content:center;border-radius:999px;border:2px solid ${active?"#0a5ea8":"#b9cde0"};background:${active?"#e8f4ff":"#fff"};font-weight:900;cursor:pointer;`},[lbl]);
    c.addEventListener("click", ()=>{
      coin=lbl;
      update();
    });
    return c;
  }

  const dieRow = el("div",{style:"display:flex;gap:10px;flex-wrap:wrap;justify-content:center"},[]);
  const coinRow = el("div",{style:"display:flex;gap:10px;justify-content:center;margin-top:10px"},[]);
  const dieFaces = [];
  for(let n=1;n<=6;n++){ const f=makeDieFace(n); dieFaces.push(f); dieRow.appendChild(f); }
  const coinH = makeCoinSide("H");
  const coinT = makeCoinSide("T");
  coinRow.appendChild(coinH); coinRow.appendChild(coinT);

  function update(){
    dieFaces.forEach((node, idx)=>{
      const n=idx+1;
      const active=(n===die);
      node.style.borderColor = active?"#0a5ea8":"#b9cde0";
      node.style.background = active?"#e8f4ff":"#fff";
    });
    [coinH,coinT].forEach(node=>{
      const active=(node.textContent===coin);
      node.style.borderColor = active?"#0a5ea8":"#b9cde0";
      node.style.background = active?"#e8f4ff":"#fff";
    });
    info.textContent = `النتيجة المختارة: (${die}, ${coin})`;
  }

  const wrap = el("div",{style:"margin:12px 0; padding:12px; border:1px solid var(--line); border-radius:16px; background:#fff"},[
    el("div",{style:"font-weight:900;margin-bottom:6px"},["النرد وقطعة النقد"]),
    el("div",{class:"muted", style:"margin-bottom:10px"},["اختر رقم النرد والوجه (H/T) لعرض شكل الزوج المرتب."]),
    dieRow, coinRow, info
  ]);
  return wrap;
}

/* ===== قراءة المدخلات من DOM بدون حفظ ===== */
function readBranchInputs(qid, bi, branch){
  const container = document.querySelector(`[data-branch-container="${qid}::${bi}"]`);
  const saved = {};
  const keys = collectPartKeys(branch);

  let ok=true;
  keys.forEach(k=>{
    const node = container ? container.querySelector(`[data-qid="${qid}"][data-bi="${bi}"][data-key="${k}"]`) : null;
    let val = "";
    if(node){
      if(node.type==="radio"){
        const checked = container.querySelector(`input[type="radio"][data-qid="${qid}"][data-bi="${bi}"][data-key="${k}"]:checked`);
        val = checked ? checked.value : "";
      }else{
        val = node.value ?? "";
      }
    }
    saved[k] = val;
    if(String(val).trim()==="") ok=false;
  });

  return {saved, okFilled: ok};
}

function applyFieldFeedback(qid, bi, grade){
  const container = document.querySelector(`[data-branch-container="${qid}::${bi}"]`);
  if(!container) return;

  const q = BANK.find(x=>x.id===qid);
  const branch = (q && q.branches) ? q.branches[bi] : null;
  const rec = ensureBranchRec(qid, bi);
  const saved = rec.saved || {};
  const status = rec.status;

  Object.entries(grade.byKey||{}).forEach(([k,ok])=>{
    const nodes = container.querySelectorAll(`[data-qid="${qid}"][data-bi="${bi}"][data-key="${k}"]`);
    nodes.forEach(n=>{
      if(n.type==="radio"){
        const wrap = n.closest(".choice");
        if(!wrap) return;

        // reset
        wrap.classList.remove("badField","goodField","revealCorrect");

        const sel = normalizeText(saved[k] != null ? saved[k] : "");
        const val = normalizeText(n.value != null ? n.value : "");
        const corr = (branch && branch.answers) ? normalizeText(branch.answers[k] != null ? branch.answers[k] : "") : "";

        // highlight only the selected option
        if(sel && val===sel){
          wrap.classList.add(ok ? "goodField" : "badField");
        }

        // on second wrong (locked): reveal the correct option only
        if(status==="locked" && corr && val===corr){
          wrap.classList.add("goodField","revealCorrect");
        }
      }else{
        const hasVal = (saved[k] != null && String(saved[k]).trim() !== "");
        n.classList.remove("badField","goodField");
        if(hasVal){
          n.classList.add(ok ? "goodField" : "badField");
        }
      }
    });
  });
}

function disableBranchInputs(qid, bi){
  const container = document.querySelector(`[data-branch-container="${qid}::${bi}"]`);
  if(!container) return;
  container.querySelectorAll(`[data-qid="${qid}"][data-bi="${bi}"][data-key]`).forEach(n=>{
    if(n.type==="radio") n.disabled = true;
    else n.disabled = true;
  });
  const saveBtn = container.querySelector(`[data-save-btn="${qid}::${bi}"]`);
  if(saveBtn) saveBtn.disabled = true;
}

/* ===== حفظ الإجابة (المنطق المتفق عليه) ===== */
function handleSaveBranch(q, branch, bi){
  const rec = ensureBranchRec(q.id, bi);

  // إذا كان مغلق/صحيح فلا حفظ
  if(rec.status==="correct" || rec.status==="locked" || !window.__examRunning) return;

  const {saved, okFilled} = readBranchInputs(q.id, bi, branch);
  if(!okFilled){
    openModal("تنبيه", `<div style="font-weight:900">أكمل جميع الخانات المطلوبة ثم اضغط (حفظ الإجابة).</div>`);
    return;
  }

  // سجل المحاولة والحفظ
  rec.attempts = (rec.attempts || 0) + 1;
  rec.saved = saved;
  if(state.dirty) state.dirty[q.id] = false;
  saveState();

  const grade = gradeBranch(q, branch, bi, rec.saved);
  if(grade.okAll){
    rec.status = "correct";
    saveState();
  applyFieldFeedback(q.id, bi, grade);
    disableBranchInputs(q.id, bi);
    setProgress(); renderSidebar();
    return;
  }

  // خطأ
  if(rec.attempts === 1){
    rec.status = "wrong1";
    saveState();
  applyFieldFeedback(q.id, bi, grade);
    setProgress(); renderSidebar();
    // افتح المساعدة تلقائياً (بدون طريقة الحل)
    openHelp(q, branch);
    return;
  }

  // المحاولة الثانية: إظهار الإجابة الصحيحة وإغلاق التعديل
  rec.status = "locked";
  saveState();
  applyFieldFeedback(q.id, bi, grade);
  disableBranchInputs(q.id, bi);
  setProgress(); renderSidebar();
  promptOpenCorrectAnswer(q, branch, bi);
}

/* ===== تبديل السؤال ===== */
function swapQuestion(qid){
  bumpVariant(qid);
  clearQuestionState(qid);
  const t = TEMPLATES.find(x=>x.id===qid);
  if(t){
    const v = getVariant(t.id);
    const g = t.gen(v);
    const ni = BANK.findIndex(q=>q.id===qid);
    const obj = { id:t.id, title:t.title, icon:t.icon, branches:g.branches };
    if(ni>=0) BANK[ni]=obj;
  }
  saveState();
  renderAll();
}

/* ===== التنقل ===== */
function next(){
  if(typeof ensureSupportForWeakQuestions === "function" && ensureSupportForWeakQuestions()){
    saveState();
  }
  const start = Math.min(state.currentIndex + 1, BANK.length);
  for(let i=start;i<BANK.length;i++){
    if(!isQuestionComplete(BANK[i])){
      state.currentIndex = i;
      saveState();
      renderAll();
      return;
    }
  }
  for(let i=0;i<BANK.length;i++){
    if(!isQuestionComplete(BANK[i])){
      state.currentIndex = i;
      saveState();
      renderAll();
      return;
    }
  }
  tryShowResults();
}
function prev(){
  for(let i=state.currentIndex-1;i>=0;i--){
    if(BANK[i]){
      state.currentIndex=i;
      saveState();
      renderAll();
      return;
    }
  }
}

/* ===== النتيجة (نافذة منبثقة) ===== */
function listIncomplete(){
  const arr=[];
  BANK.forEach((q,i)=>{
    if(!isQuestionComplete(q)) arr.push({i:i+1, title:q.title});
  });
  return arr;
}

function tryShowResults(){
  if(typeof ensureSupportForWeakQuestions === "function" && ensureSupportForWeakQuestions()){
    renderAll();
    openModal("متابعة الإتقان", `<div style="font-weight:900;line-height:1.9">تمت إضافة سؤال دعم بناءً على الأداء. أكمل السؤال الجديد ثم ستظهر النتيجة.</div>`);
    return;
  }
  const p = setProgress();
  if(!p.doneAll){
    if(!confirm("هناك أسئلة لم تُجب عنها. هل تريد المتابعة؟")) return;
  }
  showResultsModal();
}

function computeScore(){
  let total=0, correct=0;
  BANK.forEach(q=>{
    q.branches.forEach((branch,bi)=>{
      const rec = ensureBranchRec(q.id,bi);
      const keys = collectPartKeys(branch);
      const grade = gradeBranch(q, branch, bi, rec.saved||{});
      keys.forEach(k=>{
        total++;
        if(grade.byKey[k]) correct++;
      });
    });
  });
  const pct = total? (correct/total)*100 : 0;
  return {correct,total,pct:Math.round(pct*10)/10};
}
