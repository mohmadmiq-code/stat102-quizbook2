<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>جامعة الملك سعود — السنة الأولى المشتركة — STAT 102 | 2.2 التوزيعات التكرارية والرسوم البيانية</title>
  <link rel="stylesheet" href="../assets/vendor/katex/katex.min.css">
  <link rel="stylesheet" href="../assets/vendor/fonts/local-fonts.css">
  <script src="../assets/vendor/katex/katex.min.js"></script>
  <script src="../assets/vendor/katex/auto-render.min.js"></script>
  <style>
    :root{
      --bg:#f8fafc;
      --bg-warm:#fefefe;
      --card:#ffffff;
      --ink:#0f172a;
      --ink-soft:#1e293b;
      --muted:#64748b;
      --brand:#0369a1;
      --brand2:#0c4a6e;
      --brand-light:#e0f2fe;
      --accent:#0284c7;
      --accent-hover:#0ea5e9;
      --good:#059669;
      --good-bg:#d1fae5;
      --bad:#dc2626;
      --bad-bg:#fee2e2;
      --warn:#d97706;
      --warn-bg:#fef3c7;
      --line:#e2e8f0;
      --line-soft:#f1f5f9;
      --shadow-sm: 0 1px 3px rgba(15,23,42,.06);
      --shadow: 0 4px 20px rgba(15,23,42,.07);
      --shadow-lg: 0 20px 50px rgba(15,23,42,.1);
      --r:16px;
      --r-lg:22px;
      --font:"Cairo", "Noto Sans Symbols 2", system-ui, -apple-system, sans-serif;
      --transition: .2s cubic-bezier(.4,0,.2,1);
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      font-family:var(--font);
      color:var(--ink);
      line-height:1.6;
      background:
        radial-gradient(ellipse 140% 80% at 90% 0%, rgba(3,105,161,.06), transparent 50%),
        radial-gradient(ellipse 100% 60% at 10% 100%, rgba(12,74,110,.04), transparent 45%),
        var(--bg);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .topbar{
      background: linear-gradient(135deg, var(--brand2) 0%, var(--brand) 50%, #0e7490 100%);
      color:#fff;
      padding:16px 14px;
      min-height:80px;
      position:sticky; top:0; z-index:10;
      box-shadow: var(--shadow-lg);
      backdrop-filter: blur(8px);
    }
    .topbar .row{
      max-width:1280px;
      margin:0 auto;
      display:flex;
      align-items:center;
      justify-content:space-between;
      position:relative;
      gap:16px;
      padding:12px 80px;
      min-height:56px;
    }
    .topbar .row .topbarRight{display:flex; align-items:center; gap:8px; flex:0 0 auto;}
    .topbar .row .timerBar{flex:0 0 auto;}
    .topbar .row .brandblock{position:absolute; left:50%; transform:translateX(-50%); display:flex; align-items:center; justify-content:center; gap:14px; min-width:0; max-width:55%; text-align:center;}
    .topbar .row .logoWrap{flex:0 0 auto;}
    .brandblock{display:flex; align-items:center; gap:14px; min-width:0; text-align:center;}
    .brandtext{min-width:0; text-align:center}
    .brandtext .u{font-size:19px;font-weight:800;letter-spacing:-.02em;line-height:1.2}
    .brandtext .u.en{font-size:13px;font-weight:700;opacity:.9;margin-top:2px;direction:ltr;unicode-bidi:embed;letter-spacing:.03em}
    .sep{opacity:.6;margin:0 6px;font-weight:600;font-size:12px}
    .brandtext .d{font-size:13px;font-weight:700;opacity:.92;margin-top:2px;line-height:1.3}
    .brandtext .s{font-size:12px;opacity:.85;margin-top:2px;font-weight:600}

    .timerBar{font-size:14px;font-weight:800;white-space:nowrap;padding:6px 12px;background:rgba(255,255,255,.2);border-radius:10px;border:1px solid rgba(255,255,255,.35);min-width:90px;text-align:center;}
    .timerBar.warn{background:rgba(217,119,6,.4);border-color:rgba(255,255,255,.5);}
    .timerBar.done{background:rgba(220,38,38,.4);border-color:rgba(255,255,255,.5);}

    .logoWrap{
      position:absolute;
      left:14px;
      top:50%;
      transform:translateY(-50%);
      display:flex; align-items:center; justify-content:center;
      padding:10px 12px;
      background: rgba(255,255,255,.18);
      border:1px solid rgba(255,255,255,.35);
      border-radius:12px;
      box-shadow:
        0 12px 24px rgba(0,0,0,.2),
        0 0 0 4px rgba(30,167,255,.10);
      flex:0 0 auto;
      transition: var(--transition);
    }
    .logoWrap:hover{background:rgba(255,255,255,.25);transform:translateY(-50%) scale(1.02)}
    .logoWrap img{height:52px;width:auto;display:block;}

    .wrap{
      max-width:900px;
      margin:24px auto 40px;
      padding:0 24px;
      display:block;
    }
    @media (min-width:1100px){
      .wrap{ max-width:calc(66.666vw); }
    }
    @media (max-width: 820px){ .wrap{ max-width:100%; padding:0 12px; } }
    /* إخفاء اللوحات الجانبية من الشبكة – ستُعرض كدرج عائم */
    .side, .aiResultsRail { display:none !important; }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--r-lg);
      box-shadow: var(--shadow);
      overflow:hidden;
      transition: var(--transition);
    }
    .card:hover{box-shadow: 0 8px 30px rgba(15,23,42,.09)}
    .mainhead{
      padding:12px 16px;
      border-bottom:1px solid var(--line);
      display:flex; gap:10px; align-items:center; justify-content:center;
      background: linear-gradient(180deg, var(--line-soft) 0%, var(--card) 100%);
    }
    .pill{
      background:var(--brand-light);color:var(--brand);border:1px solid rgba(3,105,161,.25);
      border-radius:999px;padding:6px 12px;font-weight:700;font-size:12px;white-space:nowrap;
    }
    .pill.warn{background:var(--warn-bg);color:var(--warn);border-color:rgba(217,119,6,.3)}
    .content{padding:20px 22px 24px}

    .qtitleRow{display:flex; align-items:center; justify-content:space-between;
      gap:12px; margin-bottom:16px; flex-wrap:wrap;}
    .qtitle{display:flex; align-items:center; gap:12px; font-size:17px; font-weight:800; color:var(--ink); min-width:0;}
    .qtitle .qnum{
      width:42px;height:42px;border-radius:12px;display:grid;place-items:center;
      background: linear-gradient(135deg, var(--brand-light), #bae6fd);
      border:1px solid rgba(3,105,161,.2);color:var(--brand);font-weight:800;flex:0 0 auto;
      font-size:16px;
    }
    .qmeta{display:flex; gap:10px; flex-wrap:wrap; align-items:center;}

    .btn{
      border:1px solid var(--line);
      background:var(--card);
      color:var(--ink);
      border-radius:12px;
      padding:10px 16px;
      font-weight:800;
      font-size:14px;
      cursor:pointer;
      transition: var(--transition);
      display:inline-flex; align-items:center; gap:8px;
      user-select:none;
      white-space:nowrap;
      font-family:var(--font);
    }
    .btn:hover{
      background:var(--line-soft);
      border-color:var(--muted);
      transform:translateY(-1px);
      box-shadow: var(--shadow-sm);
    }
    .btn.primary{
      background: linear-gradient(135deg, var(--brand), var(--brand2));
      border-color: transparent;
      color:#fff;
    }
    .btn.primary:hover{
      background: linear-gradient(135deg, var(--accent), var(--brand));
      box-shadow: 0 4px 16px rgba(3,105,161,.35);
    }
    .btn.small{padding:8px 14px;font-size:13px;border-radius:10px}
    .btn:disabled{cursor:not-allowed;opacity:.55;transform:none;box-shadow:none}
        .btn.ai-help-btn{
      position:relative;
      isolation:isolate;
      border:1px solid rgba(8,145,178,.34);
      background:
        linear-gradient(135deg, rgba(224,242,254,.98) 0%, rgba(240,249,255,.98) 52%, rgba(207,250,254,.98) 100%);
      color:var(--brand2);
      font-weight:900;
      overflow:hidden;
      box-shadow:0 10px 24px rgba(8,145,178,.16);
    }
    .btn.ai-help-btn::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(115deg, transparent 0 28%, rgba(255,255,255,.78) 45%, transparent 62%),
        repeating-linear-gradient(90deg, rgba(14,165,233,.09) 0 1px, transparent 1px 12px);
      opacity:.9;
      transform:translateX(-26%);
      transition:transform .45s ease;
      z-index:-1;
    }
    .btn.ai-help-btn::after{
      content:"";
      position:absolute;
      inset:-1px;
      border-radius:inherit;
      pointer-events:none;
      box-shadow:0 0 0 0 rgba(8,145,178,.28);
      animation:aiPulse 2.4s infinite;
    }
    .btn.ai-help-btn:hover{
      border-color:#0891b2;
      background:linear-gradient(135deg, #dbeafe 0%, #e0f7ff 48%, #ccfbf1 100%);
      box-shadow:0 14px 28px rgba(8,145,178,.24);
      transform:translateY(-2px) scale(1.01);
    }
    .btn.ai-help-btn:hover::before{transform:translateX(6%)}
    .btn.ai-help-btn:hover .ai-help-glyph{animation:aiWake .9s ease both}
    .ai-help-glyph{
      width:22px;
      height:22px;
      border-radius:8px;
      display:inline-grid;
      place-items:center;
      position:relative;
      background:linear-gradient(135deg, #0f172a, #0369a1 72%, #22d3ee 100%);
      color:#fff;
      font-size:11px;
      font-weight:900;
      letter-spacing:.04em;
      box-shadow:0 6px 16px rgba(3,105,161,.28);
    }
    .ai-help-glyph::before,
    .ai-help-glyph::after{
      content:"";
      position:absolute;
    }
    .ai-help-glyph::before{
      inset:3px;
      border:1.5px solid rgba(255,255,255,.72);
      border-radius:4px;
      opacity:.88;
    }
    .ai-help-glyph::after{
      width:6px;
      height:6px;
      border-radius:50%;
      background:#67e8f9;
      box-shadow:0 0 0 2px rgba(255,255,255,.18), 0 0 14px rgba(103,232,249,.9);
    }
    .ai-help-panel{
      display:grid;
      gap:16px;
      animation:aiPanelReveal .38s ease both;
    }
    .ai-help-hero{
      position:relative;
      animation:aiHeroFloat 5.2s ease-in-out infinite;
      overflow:hidden;
      display:flex;
      align-items:center;
      gap:16px;
      padding:18px;
      border-radius:18px;
      border:1px solid rgba(8,145,178,.22);
      background:
        radial-gradient(circle at 18% 22%, rgba(34,211,238,.24), transparent 28%),
        radial-gradient(circle at 88% 18%, rgba(59,130,246,.18), transparent 24%),
        linear-gradient(135deg, #082f49 0%, #0f172a 48%, #0c4a6e 100%);
      color:#fff;
      box-shadow:0 18px 40px rgba(15,23,42,.18);
    }
    .ai-help-hero::after{
      content:"";
      position:absolute;
      inset:0;
      background:repeating-linear-gradient(90deg, rgba(255,255,255,.06) 0 1px, transparent 1px 16px);
      opacity:.35;
      pointer-events:none;
    }
    .ai-help-orb{
      width:72px;
      height:72px;
      border-radius:22px;
      flex:0 0 auto;
      display:grid;
      place-items:center;
      position:relative;
      border:1px solid rgba(255,255,255,.2);
      background:linear-gradient(135deg, rgba(255,255,255,.2), rgba(255,255,255,.08));
      box-shadow:inset 0 1px 0 rgba(255,255,255,.18), 0 14px 28px rgba(8,145,178,.22);
    }
    .ai-help-orb::before,
    .ai-help-orb::after{
      content:"";
      position:absolute;
      border-radius:50%;
      border:1px solid rgba(103,232,249,.55);
    }
    .ai-help-orb::before{inset:10px}
    .ai-help-orb::after{inset:20px;border-color:rgba(255,255,255,.65)}
    .ai-help-orb span{
      width:14px;
      height:14px;
      border-radius:50%;
      background:#67e8f9;
      box-shadow:0 0 18px rgba(103,232,249,.95);
      animation:aiCorePulse 2.8s ease-in-out infinite;
    }
    .ai-help-copy{position:relative;z-index:1;display:grid;gap:6px}
    .ai-help-kicker{
      display:inline-flex;
      align-items:center;
      gap:8px;
      width:max-content;
      padding:5px 10px;
      border-radius:999px;
      background:rgba(255,255,255,.12);
      border:1px solid rgba(255,255,255,.16);
      font-size:11px;
      font-weight:800;
      letter-spacing:.08em;
    }
    .ai-help-kicker::before{
      content:"";
      width:8px;
      height:8px;
      border-radius:50%;
      background:#67e8f9;
      box-shadow:0 0 10px rgba(103,232,249,.9);
    }
    .ai-help-title{
      font-size:18px;
      font-weight:900;
      line-height:1.5;
    }
    .ai-help-subtitle{
      color:rgba(255,255,255,.82);
      font-size:13px;
      font-weight:700;
      line-height:1.9;
    }
    .ai-help-grid{
      display:grid;
      grid-template-columns:repeat(2, minmax(0,1fr));
      gap:14px;
    }
    .ai-help-section{
      position:relative;
      overflow:hidden;
      border:1px solid rgba(148,163,184,.24);
      border-radius:16px;
      padding:16px;
      background:linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
      box-shadow:0 10px 28px rgba(15,23,42,.07);
    }
    .ai-help-section::before{
      content:"";
      position:absolute;
      inset:0 auto 0 0;
      width:4px;
      background:linear-gradient(180deg, #22d3ee, #0369a1);
    }
    .ai-help-section-head{
      display:flex;
      align-items:center;
      gap:10px;
      margin-bottom:10px;
      font-size:15px;
      font-weight:900;
      color:var(--ink);
    }
    .ai-help-chip-icon{
      width:34px;
      height:34px;
      border-radius:11px;
      display:grid;
      place-items:center;
      background:linear-gradient(135deg, rgba(8,145,178,.16), rgba(14,165,233,.08));
      color:var(--brand2);
      border:1px solid rgba(8,145,178,.2);
      font-size:16px;
    }
    .ai-help-body{
      color:var(--ink-soft);
      font-size:14px;
      font-weight:700;
      line-height:1.95;
    }
    .ai-help-body ul,
    .ai-help-body ol{margin:0;padding-right:18px}
    @media (max-width: 720px){
      .ai-help-hero{flex-direction:column;align-items:flex-start;padding:16px}
      .ai-help-grid{grid-template-columns:1fr}
      .ai-help-orb{width:64px;height:64px;border-radius:18px}
    }
    @keyframes aiPulse{0%{box-shadow:0 0 0 0 rgba(8,145,178,.28)}70%{box-shadow:0 0 0 10px rgba(8,145,178,0)}100%{box-shadow:0 0 0 0 rgba(8,145,178,0)}}
    @keyframes aiWake{0%{transform:scale(1) rotate(0)}35%{transform:scale(1.08) rotate(-8deg)}70%{transform:scale(.96) rotate(8deg)}100%{transform:scale(1) rotate(0)}}
    @keyframes aiCorePulse{0%,100%{transform:scale(.92);box-shadow:0 0 14px rgba(103,232,249,.72)}50%{transform:scale(1.14);box-shadow:0 0 26px rgba(103,232,249,.98)}}
    @keyframes aiHeroFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
    @keyframes aiPanelReveal{0%{opacity:0;transform:translateY(8px) scale(.985)}100%{opacity:1;transform:translateY(0) scale(1)}}
    button:focus, .btn:focus{outline:none}
    button:focus-visible, .btn:focus-visible, a:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

    .branches{display:grid; gap:16px;}
    .branch{border:1px solid var(--line); border-radius:16px; background:var(--card); overflow:hidden; transition: var(--transition);}
    .branch:hover{border-color:var(--line);box-shadow: var(--shadow-sm)}
    .branchHead{
      display:flex; align-items:center; justify-content:flex-end; gap:12px;
      padding:14px 16px;
      background: linear-gradient(180deg, var(--line-soft), var(--card));
      border-bottom:1px solid var(--line);
    }
    .btag{font-size:12px;padding:6px 12px;border-radius:10px;font-weight:800;border:1px solid;white-space:nowrap;}
    .btag.easy{background:var(--good-bg);border-color:rgba(5,150,105,.25);color:var(--good)}
    .btag.med{background:var(--warn-bg);border-color:rgba(217,119,6,.25);color:var(--warn)}
    .btag.hard{background:var(--bad-bg);border-color:rgba(220,38,38,.25);color:var(--bad)}
    .branchBody{padding:14px 16px 16px; line-height:1.75; font-size:14px; font-weight:600; color:var(--ink-soft)}

    .parts{display:grid; gap:12px; margin-top:16px;}
    .part{
      border:1px solid var(--line);
      border-radius:14px;
      padding:14px 16px;
      display:flex;
      gap:14px;
      align-items:center;
      justify-content:center;
      background: var(--bg-warm);
    }
    .part .label{font-weight:800;color:var(--ink);line-height:1.5;min-width:0;font-size:14px}
    .part .inputWrap{display:flex; gap:10px; align-items:center; justify-content:flex-end; flex:0 0 auto;}
    input[type="text"], input[type="number"], textarea, select{
      border:2px solid var(--line);
      border-radius:12px;
      padding:12px 14px;
      font-size:15px;
      min-width:180px;
      outline:none;
      transition: var(--transition);
      background:var(--card);
      font-family:var(--font);
      font-weight:700;
      color:var(--ink);
    }
    textarea{min-width:260px; min-height:90px; resize:vertical}
    input:focus, textarea:focus, select:focus{
      border-color:var(--brand);
      box-shadow: 0 0 0 3px rgba(3,105,161,.15);
    }
    .branchBtns{display:flex; gap:10px; flex-wrap:wrap; margin-top:14px; justify-content:flex-start}

    .side{padding:20px;}
    .side .head{display:flex; align-items:center; justify-content:center; gap:12px; margin-bottom:14px;}
    .side .head h3{margin:0; font-size:18px; font-weight:900; color:var(--ink);}
    .progress{height:12px;background:var(--line);border-radius:999px;overflow:hidden;}
    .progress > div{height:100%;width:0%;background:linear-gradient(90deg,var(--accent),var(--brand));border-radius:999px;transition:.4s width ease-out;}
    .qList{margin-top:14px;display:flex;flex-direction:column;gap:10px;}
    .qItem{
      border:2px solid var(--line);
      border-radius:14px;
      padding:12px 14px;
      display:flex; align-items:center; gap:12px;
      background:var(--card);
      cursor:pointer;
      transition: var(--transition);
    }
    .qItem:hover{
      border-color:var(--brand);
      transform:translateX(-2px);
      box-shadow: var(--shadow-sm);
    }
    .qItem.active{border-color:var(--brand); background:var(--brand-light); box-shadow: 0 0 0 2px rgba(3,105,161,.2)}
    .qItem .left{display:flex; align-items:center; gap:12px; min-width:0;}
    .dot{width:10px;height:10px;border-radius:50%;background:var(--muted); flex-shrink:0;}
    .dot.done{background:var(--good)}
    .dot.bad{background:var(--bad)}
    .qItem .name{font-weight:800;line-height:1.3;min-width:0;font-size:13px; color:var(--ink)}
    .icon{
      width:38px;height:38px;border-radius:12px;
      display:grid;place-items:center;
      background: var(--brand-light);
      border:1px solid rgba(3,105,161,.2);
      color:var(--brand);
      font-weight:900;
      flex:0 0 auto;
      font-size:15px;
    }
    .badge{
      font-size:11px;
      padding:5px 10px;
      border-radius:8px;
      font-weight:800;
      border:1px solid;
      white-space:nowrap;
    }
    .badge.warn{background:var(--warn-bg);border-color:rgba(217,119,6,.3);color:var(--warn)}
    .badge.good{background:var(--good-bg);border-color:rgba(5,150,105,.3);color:var(--good)}

    .resultWrap{padding:20px;}
    .scoreCard{
      border:2px solid var(--line);
      border-radius:18px;
      padding:20px;
      background: linear-gradient(180deg, var(--line-soft), var(--card));
      box-shadow: var(--shadow-sm);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      flex-wrap:wrap;
      margin-bottom:16px;
    }
    .scoreBig{font-size:20px;font-weight:900;color:var(--ink)}
    .scoreSub{font-size:13px;font-weight:600;color:var(--muted);margin-top:4px}
    .resultCard{border:1px solid var(--line);border-radius:16px;background:var(--card);padding:16px;margin-top:14px; transition: var(--transition);}
    .resultCard:hover{border-color:var(--line); box-shadow: var(--shadow-sm)}
    .resultCard .rt{display:flex; align-items:center; justify-content:center;
      position:relative; gap:10px; flex-wrap:wrap; margin-bottom:8px;}
    .tag{font-size:12px;padding:6px 12px;border-radius:10px;font-weight:800;border:1px solid;}
    .tag.good{background:var(--good-bg);border-color:rgba(5,150,105,.3);color:var(--good)}
    .tag.bad{background:var(--bad-bg);border-color:rgba(220,38,38,.3);color:var(--bad)}
    .partRow{
      display:grid;
      grid-template-columns: 1.15fr .9fr .95fr;
      gap:12px;
      padding:12px 14px;
      border-radius:12px;
      border:1px solid var(--line);
      background:var(--bg-warm);
      margin-top:10px;
      font-size:13px;
      font-weight:600;
    }
    .partRow b{font-weight:800}

    .modal{position:fixed;inset:0;background:rgba(15,23,42,.5);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;padding:20px;z-index:100;}
    .modal.show{display:flex;animation:modalFadeIn .2s ease}
    @keyframes modalFadeIn{from{opacity:0}to{opacity:1}}

/* ═══════════════════════════════════════════════
   تصميم جامعي — نظام ألوان رسمي
═══════════════════════════════════════════════ */
:root{
  --uni-gold: #C8972A;
  --uni-gold-light: #FDF6E3;
  --uni-gold-border: rgba(200,151,42,.25);
  --uni-green: #1a6b3c;
}

/* شريط علوي — هوية أكاديمية */
.topbar{
  background:linear-gradient(135deg,#0b3c5d 0%,#154360 40%,#0d3349 100%) !important;
  border-bottom:3px solid var(--uni-gold);
}
.topbar.scrolled{
  box-shadow:0 4px 30px rgba(11,60,93,.45) !important;
}

/* شريط ذهبي دقيق تحت الـ topbar */
.topbar::after{
  content:"";
  position:absolute;
  bottom:-3px; left:0; right:0;
  height:3px;
  background:linear-gradient(90deg,transparent,var(--uni-gold),transparent);
  opacity:.6;
}

/* Cards — حدود أكاديمية */
.card{
  border-top:3px solid var(--brand) !important;
  border-radius:18px;
}

/* Section titles — طراز أكاديمي */
.mainhead{
  background:linear-gradient(180deg,#f0f7ff 0%,#ffffff 100%);
  border-bottom:2px solid var(--uni-gold-border);
}
.mainhead::after{
  content:"";
  display:block;
  position:absolute;
  bottom:0; left:20px; right:20px;
  height:1px;
  background:linear-gradient(90deg,transparent,var(--uni-gold),transparent);
  opacity:.5;
}
.mainhead{ position:relative; }

/* شارة الجامعة على السؤال */
.pill{
  background:linear-gradient(135deg,var(--uni-gold-light),#fff8e7);
  color:#8B6914;
  border-color:var(--uni-gold-border);
  font-weight:900;
}

/* ═══════════════════════════════════════════════
   تحسين شاشة الإجابة الصحيحة
═══════════════════════════════════════════════ */
.choice.goodField{
  background:linear-gradient(135deg,#f0fdf4 0%,#dcfce7 100%) !important;
  border-color:#16a34a !important;
  border-width:2px !important;
  color:#15803d !important;
  box-shadow:0 0 0 4px rgba(22,163,74,.12), 0 4px 14px rgba(22,163,74,.1) !important;
  position:relative;
}
.choice.goodField::after{
  content:"✓ صحيح";
  position:absolute;
  left:14px; top:50%;
  transform:translateY(-50%);
  font-size:11px;font-weight:900;
  color:#15803d;
  background:#dcfce7;
  padding:3px 8px;border-radius:6px;
  border:1px solid rgba(22,163,74,.3);
}
.choice.badField{
  background:linear-gradient(135deg,#fff5f5 0%,#fee2e2 100%) !important;
  border-color:#dc2626 !important;
  border-width:2px !important;
  color:#b91c1c !important;
  box-shadow:0 0 0 4px rgba(220,38,38,.1) !important;
  position:relative;
}
.choice.badField::after{
  content:"✗ خطأ";
  position:absolute;
  left:14px; top:50%;
  transform:translateY(-50%);
  font-size:11px;font-weight:900;
  color:#b91c1c;
  background:#fee2e2;
  padding:3px 8px;border-radius:6px;
  border:1px solid rgba(220,38,38,.25);
}
input.goodField, textarea.goodField{
  border-color:#16a34a !important;
  background:linear-gradient(135deg,#f0fdf4,#dcfce7) !important;
  box-shadow:0 0 0 3px rgba(22,163,74,.15) !important;
}
input.badField, textarea.badField{
  border-color:#dc2626 !important;
  background:linear-gradient(135deg,#fff5f5,#fee2e2) !important;
  box-shadow:0 0 0 3px rgba(220,38,38,.12) !important;
}

/* ═══════════════════════════════════════════════
   تطوير صفحة النتائج
═══════════════════════════════════════════════ */
.scoreCard{
  border-radius:20px !important;
  background:linear-gradient(135deg,#0b3c5d 0%,#154360 60%,#1a6b3c 100%) !important;
  border:none !important;
  color:#fff !important;
  padding:24px !important;
  box-shadow:0 20px 40px rgba(11,60,93,.25) !important;
  position:relative;
  overflow:hidden;
}
.scoreCard::before{
  content:"";
  position:absolute;
  inset:0;
  background:repeating-linear-gradient(90deg,rgba(255,255,255,.04) 0 1px,transparent 1px 20px);
  pointer-events:none;
}
.scoreCard::after{
  content:"";
  position:absolute;
  bottom:0; left:0; right:0;
  height:4px;
  background:linear-gradient(90deg,var(--uni-gold),#fde68a,var(--uni-gold));
}
.scoreBig{
  font-size:24px !important;
  font-weight:900 !important;
  color:#fff !important;
  position:relative;
}
.scoreSub{ color:rgba(255,255,255,.8) !important; position:relative; }
.score-bar-wrap{
  background:rgba(255,255,255,.15) !important;
  height:10px !important;
  border-radius:999px;
  position:relative;
}
.score-bar-correct{
  background:linear-gradient(90deg,#34d399,#a7f3d0) !important;
}

/* بطاقات النتائج */
.resultCard{
  border-radius:16px !important;
  border:1px solid var(--line) !important;
  box-shadow:0 4px 16px rgba(15,23,42,.06) !important;
  overflow:hidden;
  transition:var(--transition);
}
.resultCard:hover{
  border-color:var(--brand) !important;
  box-shadow:0 8px 24px rgba(3,105,161,.1) !important;
  transform:translateY(-1px);
}
/* رأس بطاقة النتيجة */
.resultCard > div:first-child{
  background:linear-gradient(180deg,#f8fbff 0%,#ffffff 100%);
  padding:14px 16px 12px !important;
  border-bottom:1px solid var(--line);
  margin-bottom:0 !important;
}

.tag.good{
  background:linear-gradient(135deg,#dcfce7,#f0fdf4) !important;
  border-color:rgba(22,163,74,.3) !important;
  color:#15803d !important;
  font-weight:900;
  padding:6px 14px;
}
.tag.bad{
  background:linear-gradient(135deg,#fee2e2,#fff5f5) !important;
  border-color:rgba(220,38,38,.3) !important;
  color:#b91c1c !important;
  font-weight:900;
  padding:6px 14px;
}

/* صفوف الأجزاء */
.partRow{
  border-radius:10px !important;
  border:1px solid var(--line) !important;
  background:#f8fbff !important;
  padding:12px 16px !important;
  font-size:13px;
  transition:var(--transition);
}
.partRow:hover{ background:#eef6ff !important; border-color:rgba(3,105,161,.2) !important; }

/* أزرار النتيجة */
.scoreCard .btn.primary{
  background:linear-gradient(135deg,var(--uni-gold),#b07d20) !important;
  border:none !important;
  box-shadow:0 4px 14px rgba(200,151,42,.35) !important;
  color:#fff !important;
  position:relative;
}
.scoreCard .btn.primary:hover{
  background:linear-gradient(135deg,#d4a43a,var(--uni-gold)) !important;
  transform:translateY(-2px) !important;
  box-shadow:0 8px 20px rgba(200,151,42,.45) !important;
}
:root{
  --shadow-sm: 0 1px 2px rgba(15,23,42,.04), 0 2px 8px rgba(15,23,42,.06);
  --shadow:    0 4px 6px rgba(15,23,42,.04), 0 10px 28px rgba(15,23,42,.08);
  --shadow-lg: 0 20px 25px rgba(15,23,42,.08), 0 40px 60px rgba(15,23,42,.12);
}
/* Topbar — Glass أقوى */
.topbar{
  backdrop-filter:blur(20px) saturate(180%);
  -webkit-backdrop-filter:blur(20px) saturate(180%);
  border-bottom:1px solid rgba(255,255,255,.1);
}
/* Scroll-linked shadow على الـ topbar */
.topbar.scrolled{ box-shadow:0 4px 30px rgba(15,23,42,.3); }

/* Cards — ضلع علوي ملون + hover أجمل */
.card{ border-top:3px solid var(--brand); }
.card:hover{ box-shadow:0 12px 36px rgba(15,23,42,.11); transform:translateY(-1px); }

/* Progress bar — shimmer متحرك */
.progress{
  height:8px;
  box-shadow:inset 0 1px 3px rgba(0,0,0,.07);
}
.progress > div{
  background-size:200% 100%;
  animation:progressShimmer 2.4s linear infinite;
  background-image:linear-gradient(90deg, #0369a1 0%, #38bdf8 50%, #0369a1 100%);
}
@keyframes progressShimmer{
  0%{background-position:100% 0}
  100%{background-position:-100% 0}
}

/* Question number badge */
.qtitle .qnum{
  background:linear-gradient(135deg, var(--brand), var(--brand2));
  color:#fff;
  border:none;
  box-shadow:0 6px 16px rgba(3,105,161,.3);
  font-size:17px;
  width:44px; height:44px;
  border-radius:14px;
}

/* MCQ choices — تحسين التفاعل */
.choice{
  position:relative;
  transition:all .2s cubic-bezier(.4,0,.2,1);
  border-width:2px;
}
.choice:hover{ transform:translateX(-3px); box-shadow:0 4px 14px rgba(3,105,161,.12); }
.choice.goodField{
  box-shadow:0 0 0 3px rgba(5,150,105,.18);
  animation:correctPop .3s ease;
}
.choice.badField{ box-shadow:0 0 0 3px rgba(220,38,38,.15); }
@keyframes correctPop{
  0%{transform:scale(1)}
  50%{transform:scale(1.02)}
  100%{transform:scale(1)}
}

/* Difficulty tags */
.btag{ letter-spacing:.04em; text-transform:uppercase; font-size:11px; border-radius:8px; }

/* Timer */
.timerBar{
  font-variant-numeric:tabular-nums;
  letter-spacing:.06em;
  font-size:16px;
  padding:8px 18px;
  background:rgba(255,255,255,.15);
  border:1px solid rgba(255,255,255,.3);
  border-radius:14px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.2);
}

/* AI Model cards — hover مع خط سفلي */
.aiModelCard{
  transition:transform .2s, box-shadow .2s;
  cursor:default;
}
.aiModelCard::after{
  content:"";
  position:absolute;
  bottom:0; left:0; right:0;
  height:3px;
  background:linear-gradient(90deg, var(--brand), #38bdf8);
  transform:scaleX(0);
  transition:transform .3s;
  transform-origin:right;
  border-radius:0 0 4px 4px;
}
.aiModelCard:hover{ transform:translateY(-2px); box-shadow:0 10px 28px rgba(15,23,42,.1); }
.aiModelCard:hover::after{ transform:scaleX(1); }

/* ═══════════════════════════════════════════════
   النماذج الخمسة الجديدة — CSS
═══════════════════════════════════════════════ */

/* قسم النماذج الموسّع */
.aiExtSection{
  border-radius:18px;
  border:1px solid var(--line);
  background:linear-gradient(180deg,#ffffff 0%,#f8fbff 100%);

/* ١. منحنى النسيان */

}

}
.forgettingTopicName{font-size:11px;font-weight:900;color:#24455f}

.forgettingFill{height:100%;border-radius:inherit;transition:width .5s ease;}
.forgettingPct{font-size:11px;font-weight:900;min-width:36px;text-align:left;direction:ltr;}
.forgettingReview{
  font-size:10px;font-weight:900;padding:3px 7px;border-radius:6px;white-space:nowrap;
}
.forgettingReview.now{background:#fee2e2;color:#dc2626;border:1px solid rgba(220,38,38,.2)}

.forgettingReview.ok{background:#d1fae5;color:#059669;border:1px solid rgba(5,150,105,.2)}

/* ٢. IRT — قدرة الطالب */
.irtCard{

  gap:12px;
}
.irtTheta{
  display:flex;
  align-items:center;
  gap:14px;
}
.irtThetaNum{
  font-size:28px;
  font-weight:900;
  color:var(--brand2);
  direction:ltr;
  white-space:nowrap;
}
.irtThetaSub{font-size:12px;font-weight:800;color:var(--muted);line-height:1.6}
.irtScale{
  position:relative;
  height:12px;
  border-radius:999px;
  background:linear-gradient(90deg,#dc2626 0%,#d97706 25%,#0369a1 50%,#059669 75%,#0284c7 100%);
  overflow:visible;
  margin:4px 0;
}
.irtPointer{
  position:absolute;
  top:50%;
  transform:translate(-50%,-50%);
  width:18px;height:18px;
  border-radius:50%;
  background:#fff;
  border:3px solid var(--brand);
  box-shadow:0 2px 8px rgba(3,105,161,.35);
  transition:left .5s ease;
}
.irtLabels{
  display:flex;
  justify-content:space-between;
  font-size:10px;
  font-weight:900;
  color:var(--muted);
  direction:ltr;
}
.irtSE{
  font-size:11px;

<script>
(function(){
  function safeStorage(){
    try{
      var k="__stat102_test__";

    }

  function __boot(){

/* ===== أدوات عشوائية (Seeded RNG) ===== */
function xmur3(str){
  let h = 1779033703 ^ str.length;
  for (let i = 0; i < str.length; i++) {
    h = Math.imul(h ^ str.charCodeAt(i), 3432918353);
    h = (h << 13) | (h >>> 19);
  }
  return function(){
    h = Math.imul(h ^ (h >>> 16), 2246822507);
    h = Math.imul(h ^ (h >>> 13), 3266489909);
    return (h ^= h >>> 16) >>> 0;
  }
}
function mulberry32(a){
  return function(){
    let t = a += 0x6D2B79F5;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  }
}
function seededRand(seedStr){
  const seed = xmur3(seedStr)();
  return mulberry32(seed);
}
function randInt(r, lo, hi){ return Math.floor(r()*(hi-lo+1))+lo; }

/* ===== حالة الصفحة (تُحفظ فقط عند ضغط حفظ الإجابة) ===== */
// فاصل تخزين مستقل لكل درس حتى لا تتداخل الحالات بين الدروس
const STATE_KEY = "stat102_2_2_state_v4";
const TIMER_MINUTES = 30;
const TIMER_KEY = "stat102_2_2_timerEnd_v4";
const state = loadState() || { currentIndex: 0, variants: {}, branches: {}, order: null, timerEnded: false, dirty: {}, sidebarFilter: "all", fontSize: 0 };
function saveState(){ __storage.setItem(STATE_KEY, JSON.stringify(state)); }
function loadState(){ try{ const s = JSON.parse(__storage.getItem(STATE_KEY)); if(s){ s.timerEnded = !!s.timerEnded; if(!s.dirty) s.dirty = {}; if(!s.sidebarFilter) s.sidebarFilter = "all"; if(s.fontSize==null) s.fontSize = 0; } return s; }catch(e){ return null; } }

let timerInterval = null;
function startTimer(){
  let endAt = null;
  try{ const v = __storage.getItem(TIMER_KEY); if(v) endAt = parseInt(v,10); }catch(e){}
  if(endAt == null || endAt < Date.now()){
    endAt = Date.now() + TIMER_MINUTES * 60 * 1000;
    __storage.setItem(TIMER_KEY, String(endAt));
  }
  if(endAt != null && endAt > Date.now()){
    state.timerEnded = false;
    saveState();
    renderAll();
  }
  let oneMinuteWarned = false;
  function tick(){
    if(state.timerEnded) return;
    const rem = Math.max(0, Math.ceil((endAt - Date.now()) / 1000));
    const el = document.getElementById("timerBar");
    if(!el) return;
    const m = Math.floor(rem/60), s = rem % 60;
    el.textContent = "الوقت المتبقي: " + m + ":" + (s<10?"0":"") + s;
    el.classList.remove("warn","done");
    if(rem <= 60) el.classList.add("warn");
    if(rem === 60 && !oneMinuteWarned){ oneMinuteWarned = true; openModal("تنبيه", "<p style=\"font-weight:800\">دقيقة واحدة متبقية — احفظ إجاباتك إن لم تكن محفوظة.</p>"); }
    if(rem === 0){
      if(timerInterval) clearInterval(timerInterval);
      timerInterval = null;
      window.__examRunning = false;
      state.timerEnded = true;
      saveState();
      el.textContent = "انتهى الوقت";
      el.classList.add("done");
      showResultsModal();
      renderAll();
    }
  }
  tick();
  if(timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(tick, 1000);
}

function resetAll(){
  try{

    if(_k){
      var _raw = null;

      if(!_s || typeof _s !== "object") _s = {};
      _s.examAttempts = (Number(_s.examAttempts) || 0) + 1;

/* ===== أدوات مساعدة ===== */
const SVG_TAGS = new Set(["svg","g","path","rect","line","circle","text","defs","linearGradient","stop","polyline","polygon"]);
function el(tag, attrs={}, children=[]){
  const isSvg = SVG_TAGS.has(String(tag).toLowerCase());
  const node = isSvg ? document.createElementNS("http://www.w3.org/2000/svg", tag) : document.createElement(tag);
  Object.entries(attrs).forEach(([k,v])=>{
    if(k==="class") node.className=v;
    else if(k==="html") node.innerHTML=v;
    else if(k.startsWith("on") && typeof v==="function") node.addEventListener(k.slice(2), v);
    else if(k==="disabled") node.disabled=!!v;
    else node.setAttribute(k,v);
  });
  (Array.isArray(children)?children:[children]).forEach(ch=>{
    if(ch===null || ch===undefined) return;
    node.appendChild(typeof ch==="string" ? document.createTextNode(ch) : ch);
  });
  return node;
}
function escapeHtml(s){ return String(s).replace(/[&<>"']/g, m=>({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[m])); }
function normalizeText(s){ if(s==null) return ""; return String(s).trim().replace(/\s+/g," ").replace(/[ظھ%]/g,"%"); }
function parseNumberLoose(v){
  if(v==null) return NaN;
  const s = String(v).replace(/[٬،]/g,",").replace(/[%٪]/g,"").trim();
  if(!s) return NaN;
  const n = Number(s);
  return Number.isFinite(n) ? n : NaN;
}
function nearlyEqual(a,b,eps=1e-2){
  if(a==null||b==null) return false;
  if(!Number.isFinite(a) || !Number.isFinite(b)) return false;
  return Math.abs(a-b) <= eps;
}
function roundTo(x, d=2){
  const n = Number(x);
  if(!Number.isFinite(n)) return String(x);
  const m = Math.pow(10,d);
  return (Math.round(n*m)/m).toFixed(d);
}
function formatNumber(x){
  const n = Number(x);
  if(!Number.isFinite(n)) return String(x);
  if(Math.abs(n - Math.round(n)) < 1e-9) return String(Math.round(n));
  return roundTo(n, 2);
}
function parseNumberList(s){
  if(s==null) return [];
  const raw = String(s).replace(/[،]/g, ",").trim();
  if(!raw) return [];
  return raw.split(",").map(x=>x.trim()).filter(Boolean).map(x=>Number(x)).filter(x=>Number.isFinite(x)).sort((a,b)=>a-b);
}
function sameNumberList(a,b){
  const A=parseNumberList(a), B=parseNumberList(b);
  if(A.length!==B.length) return false;
  for(let i=0;i<A.length;i++){
    if(Math.abs(A[i]-B[i])>1e-9) return false;

  return true;
}

function chunk(arr, size){

function formatMathLine(s){
  const t = latexFix(String(s??""));
  // If already contains KaTeX delimiters, keep as-is
  if(t.includes("\\(") || t.includes("\\[") || t.includes("$$")) return escapeHtml(t);
  return "\\(" + escapeHtml(t) + "\\)";
}

function smartLineHTML(s){
  const t = latexFix(String(s ?? ""));
  const hasDelims = t.includes("\\(") || t.includes("\\[") || t.includes("$$");
  const hasRealMath = hasDelims || /\\dfrac|\\frac|\\times|\\log|[\\^_]/.test(t) || (/[A-Za-z]/.test(t) && /\d/.test(t));
  /* إذا النص عربي غالباً وفيه فقط = (بدون صيغ لاتيك) لا نغلّفه بـ ltr حتى لا يتشابك الخط */
  const arabicCount = (t.match(/[\u0600-\u06FF]/g) || []).length;
  const totalLetters = (t.match(/\S/g) || []).length;
  const mostlyArabic = totalLetters > 0 && arabicCount / totalLetters >= 0.5;
  const looksMath = hasRealMath || (!mostlyArabic && /=/.test(t));
  if(looksMath){
    const body = hasDelims ? t : ("\\(" + t + "\\)");
    return `<span class="mathInline" dir="ltr">${escapeHtml(body)}</span>`;
  }
  return `<span>${escapeHtml(t)}</span>`;
}
function latexFix(s){
  if(s==null) return "";
  // Reduce doubled backslashes produced by JS string escaping
  return String(s).replace(/\\\\/g, "\\");
}

      });

function randomToken(){
  return String(Date.now()) + "_" + Math.floor(Math.random()*1000000);
}
function getVariant(qid){
  if(state.variants[qid]==null){
    state.variants[qid] = randomToken();
    saveState();
  }
  return state.variants[qid];
}
function bumpVariant(qid){
  state.variants[qid] = randomToken();
  saveState();
}

function shuffleInPlace(arr, r){
  for(let i=arr.length-1;i>0;i--){
    const j = Math.floor(r()*(i+1));
    const tmp = arr[i];
    arr[i] = arr[j];
    arr[j] = tmp;
  }
  return arr;
}
function ensureOrder(){
  const ids = TEMPLATES.map(t=>t.id);
  const ok = Array.isArray(state.order)
    && state.order.length === ids.length
    && ids.every(id=>state.order.includes(id));
  if(!ok){
    const r = seededRand("order|"+Date.now()+"|"+Math.random());
    state.order = shuffleInPlace([...ids], r);
    saveState();
  }
  return state.order;
}
function reshuffleOrder(){
  const ids = TEMPLATES.map(t=>t.id);
  const r = seededRand("order|"+Date.now()+"|"+Math.random());
  state.order = shuffleInPlace([...ids], r);
  saveState();
}

function buildBank(){
  const order = ensureOrder();
  return order.map(id=>{
    const t = TEMPLATES.find(x=>x.id===id);
    const v = getVariant(t.id);
    const g = t.gen(v);
    const obj = { id:t.id, title:t.title, icon:t.icon, branches:g.branches };
    if(g.sharedGraph != null) obj.sharedGraph = g.sharedGraph;
    return obj;
  });
}

let BANK = buildBank();

/* ===== قراءة مفاتيح الإجابات لكل فرع ===== */
function collectPartKeys(branch){
  const keys=[];
  (branch.parts||[]).forEach(p=>keys.push(p.key));
  if(branch.customUI==="freqTable" && branch.table && branch.table.rows){
    branch.table.rows.forEach(r=>(r.inputs||[]).forEach(k=>keys.push(k)));
  }
  return keys;
}

/* ===== تقييم فرع ===== */
function gradeBranch(q, branch, bi, savedObj){
  const result = { okAll: true, byKey: {} };

  // parts
  (branch.parts||[]).forEach(p=>{
    const studentRaw = (savedObj && savedObj[p.key] != null) ? savedObj[p.key] : "";
    const correct = branch.answers[p.key];
    let ok=false;
    if(p.type==="mcq"){
      ok = normalizeText(studentRaw) === normalizeText(correct);
    }else if(p.type==="text"){
      if(p.orderInsensitive) ok = sameNumberList(studentRaw, correct);
      else ok = normalizeText(studentRaw) === normalizeText(correct);
    }else{
      ok = nearlyEqual(parseNumberLoose(studentRaw), Number(correct), 1e-2);
    }
    result.byKey[p.key]=ok;
    if(!ok) result.okAll=false;
  });

  // freq table
  if(branch.customUI==="freqTable" && branch.table && branch.table.rows){
    branch.table.rows.forEach(r=>{
      (r.inputs||[]).forEach(k=>{
        const studentRaw = (savedObj && savedObj[k] != null) ? savedObj[k] : "";
        const correct = branch.answers[k];
        const ok = nearlyEqual(parseNumberLoose(studentRaw), Number(correct), 1e-2);
        result.byKey[k]=ok;
        if(!ok) result.okAll=false;
      });
    });
  }

  return result;
}

/* ===== حالة الإنجاز ===== */
function isBranchComplete(qid, bi){
  const rec = ensureBranchRec(qid, bi);
  return rec.status==="correct" || rec.status==="locked" || !window.__examRunning;
}
function isQuestionComplete(q){
  return q.branches.every((b,bi)=>isBranchComplete(q.id, bi));
}
function isQuestionCorrect(q){
  return q.branches.every((b,bi)=>ensureBranchRec(q.id,bi).status==="correct");
}
function isQuestionWrong(q){
  return q.branches.some((b,bi)=>ensureBranchRec(q.id,bi).status==="locked");
}

function setProgress(){
  const completed = BANK.filter(q=>isQuestionComplete(q)).length;
  const visibleCompleted = window.__examRunning ? completed : 0;
    const qCountEl = document.getElementById("qCount");
  const qNoEl = document.getElementById("qNo");
  if(qCountEl) qCountEl.textContent = BANK.length;
  if(qNoEl) qNoEl.textContent = (state.currentIndex+1);
  document.getElementById("progressText").textContent = `تم حل ${visibleCompleted} سؤال`;
  document.getElementById("progressBar").style.width = `${BANK.length ? (visibleCompleted/BANK.length)*100 : 0}%`;

  const pill = document.getElementById("statusPill");
  const q = BANK[state.currentIndex];
  if(isQuestionComplete(q)){
    if(isQuestionCorrect(q)){
      pill.textContent="مكتمل";
      pill.className="pill";
    }else{
      pill.textContent="مكتمل (إجابة غير صحيحة)";
      pill.className="pill warn";
    }
  }else{
    pill.textContent="غير مكتمل";
    pill.className="pill warn";
  }

  const showBtn = document.getElementById("showResultsBtn");
  const nextBtnSide = document.getElementById("nextBtnSide");
  showBtn.disabled = (completed !== BANK.length) || !window.__examRunning;
  if(nextBtnSide) nextBtnSide.disabled = !window.__examRunning;

  return {completed, doneAll: (completed === BANK.length)};
}

function piePaths(counts, cx, cy, r){
  const total = counts.reduce((a,b)=>a+b,0);
  let a0 = -Math.PI/2;
  const paths = [];
  for(let i=0;i<counts.length;i++){
    const frac = counts[i]/total;
    const a1 = a0 + frac*2*Math.PI;
    const x0 = cx + r*Math.cos(a0), y0 = cy + r*Math.sin(a0);
    const x1 = cx + r*Math.cos(a1), y1 = cy + r*Math.sin(a1);
    const large = (a1-a0) > Math.PI ? 1 : 0;
    const d = `M ${cx} ${cy} L ${x0} ${y0} A ${r} ${r} 0 ${large} 1 ${x1} ${y1} Z`;
    paths.push({d, frac, a0, a1});
    a0 = a1;
  }
  return paths;
}

/* ===== قراءة المدخلات من DOM بدون حفظ ===== */
function readBranchInputs(qid, bi, branch){
  const container = document.querySelector(`[data-branch-container="${qid}::${bi}"]`);
  const saved = {};
  const keys = collectPartKeys(branch);

  let ok=true;
  keys.forEach(k=>{
    const node = container ? container.querySelector(`[data-qid="${qid}"][data-bi="${bi}"][data-key="${k}"]`) : null;
    let val = "";
    if(node){
      if(node.type==="radio"){
        const checked = container.querySelector(`input[type="radio"][data-qid="${qid}"][data-bi="${bi}"][data-key="${k}"]:checked`);
        val = checked ? checked.value : "";
      }else{
        val = node.value ?? "";
      }
    }
    saved[k] = val;
    if(String(val).trim()==="") ok=false;
  });

  return {saved, okFilled: ok};
}

function applyFieldFeedback(qid, bi, grade){
  const container = document.querySelector(`[data-branch-container="${qid}::${bi}"]`);
  if(!container) return;

  const q = BANK.find(x=>x.id===qid);
  const branch = (q && q.branches) ? q.branches[bi] : null;
  const rec = ensureBranchRec(qid, bi);
  const saved = rec.saved || {};
  const status = rec.status;

  Object.entries(grade.byKey||{}).forEach(([k,ok])=>{
    const nodes = container.querySelectorAll(`[data-qid="${qid}"][data-bi="${bi}"][data-key="${k}"]`);
    nodes.forEach(n=>{
      if(n.type==="radio"){
        const wrap = n.closest(".choice");
        if(!wrap) return;

        // reset
        wrap.classList.remove("badField","goodField","revealCorrect");

        const sel = normalizeText(saved[k] != null ? saved[k] : "");
        const val = normalizeText(n.value != null ? n.value : "");
        const corr = (branch && branch.answers) ? normalizeText(branch.answers[k] != null ? branch.answers[k] : "") : "";

        // highlight only the selected option
        if(sel && val===sel){
          wrap.classList.add(ok ? "goodField" : "badField");
        }

        // on second wrong (locked): reveal the correct option only
        if(status==="locked" && corr && val===corr){
          wrap.classList.add("goodField","revealCorrect");
        }
      }else{
        const hasVal = (saved[k] != null && String(saved[k]).trim() !== "");
        n.classList.remove("badField","goodField");
        if(hasVal){
          n.classList.add(ok ? "goodField" : "badField");
        }
      }
    });
  });
}

function disableBranchInputs(qid, bi){
  const container = document.querySelector(`[data-branch-container="${qid}::${bi}"]`);
  if(!container) return;
  container.querySelectorAll(`[data-qid="${qid}"][data-bi="${bi}"][data-key]`).forEach(n=>{
    if(n.type==="radio") n.disabled = true;
    else n.disabled = true;
  });
  const saveBtn = container.querySelector(`[data-save-btn="${qid}::${bi}"]`);
  if(saveBtn) saveBtn.disabled = true;
}

function openHelp(q, branch){
  const explainHtml = (branch.explain && branch.explain.length)
    ? `<ul>${branch.explain.map(s=>`<li>${escapeHtml(latexFix(s))}</li>`).join("")}</ul>`
    : "<div style='color:var(--muted);font-weight:700'>ابدأ بتحديد المعطيات ثم نوع المطلوب قبل التعويض.</div>";
  const formulaHtml = (branch.formula && branch.formula.length)

function openCorrectAnswer(q, branch, bi){
  /* INLINE_ANSWER_OVERRIDE */
  try{
    if(window.FeedbackSystem && typeof window.FeedbackSystem.renderInlineSolutionForLegacy==="function"){
      if(window.FeedbackSystem.renderInlineSolutionForLegacy(q, branch, bi)) return;
    }
  }catch(_e){}
  const steps = (branch.solutionSteps && branch.solutionSteps.length)
    ? `<div style="font-weight:900;margin:10px 0 6px">طريقة الحل</div>
       <ol style="margin:0;padding-right:18px">${branch.solutionSteps.map(s=>`<li style="margin:8px 0">${smartLineHTML(s)}</li>`).join("")}</ol>`
    : "";

  // List correct values for parts
  const correctList = [];

    correctList.push(`<li><b>${escapeHtml(p.label)}:</b> ${escapeHtml(String(val))}</li>`);

  if(branch.customUI==="freqTable" && branch.table && branch.table.rows){
    branch.table.rows.forEach(r=>{
      (r.inputs||[]).forEach(k=>{
        correctList.push(`<li><b>قيمة</b>: ${escapeHtml(String(formatNumber(branch.answers[k])))}</li>`);

  const correctHtml = correctList.length
    ? `<div style="font-weight:900;margin:12px 0 6px">الإجابة الصحيحة</div>

/* ===== حفظ الإجابة (المنطق المتفق عليه) ===== */
function handleSaveBranch(q, branch, bi){
  const rec = ensureBranchRec(q.id, bi);

  // إذا كان مغلق/صحيح فلا حفظ
  if(rec.status==="correct" || rec.status==="locked" || !window.__examRunning) return;

  const {saved, okFilled} = readBranchInputs(q.id, bi, branch);
  if(!okFilled){
    openModal("تنبيه", `<div style="font-weight:900">أكمل جميع الخانات المطلوبة ثم اضغط (حفظ الإجابة).</div>`);
    return;
  }

  // سجل المحاولة والحفظ
  rec.attempts = (rec.attempts || 0) + 1;
  rec.saved = saved;
  delete state.dirty[q.id];
  saveState();

  const grade = gradeBranch(q, branch, bi, rec.saved);
  if(grade.okAll){
    rec.status = "correct";
    saveState();
  applyFieldFeedback(q.id, bi, grade);
    disableBranchInputs(q.id, bi);
    setProgress(); renderSidebar();
    return;
  }

  // خطأ
  if(rec.attempts === 1){
    rec.status = "wrong1";
    saveState();
  applyFieldFeedback(q.id, bi, grade);
    setProgress(); renderSidebar();
    // افتح المساعدة تلقائياً (بدون طريقة الحل)
    openHelp(q, branch);
    return;
  }

  // المحاولة الثانية: إظهار الإجابة الصحيحة وإغلاق التعديل
  rec.status = "locked";
  saveState();
  applyFieldFeedback(q.id, bi, grade);
  disableBranchInputs(q.id, bi);
  setProgress(); renderSidebar();
  promptOpenCorrectAnswer(q, branch, bi);
}

/* ===== تبديل السؤال ===== */
function swapQuestion(qid){
  // يبدّل نسخة السؤال الحالي فقط (بدون تغيير ترتيب مسار الأسئلة)
  bumpVariant(qid);
  clearQuestionState(qid);

  const t = TEMPLATES.find(x=>x.id===qid);
  if(t){
    const v = getVariant(t.id);
    const g = t.gen(v);
    const ni = BANK.findIndex(q=>q.id===qid);
    const obj = { id:t.id, title:t.title, icon:t.icon, branches:g.branches };
    if(g.sharedGraph != null) obj.sharedGraph = g.sharedGraph;
    if(ni>=0) BANK[ni]=obj;
    else BANK.push(obj);
    if(ni>=0) state.currentIndex = ni;
  }

  saveState();
  renderAll();
}

/* ===== التنقل ===== */
function next(){
  if(state.currentIndex < BANK.length-1){
    state.currentIndex++;
    saveState();
    renderAll();
  }else{
    tryShowResults();
  }
}
function prev(){
  if(state.currentIndex>0){
    state.currentIndex--;
    saveState();
    renderAll();
  }
}

function listIncomplete(){
  const arr=[];
  BANK.forEach((q,i)=>{
    if(!isQuestionComplete(q)) arr.push({i:i+1, title:q.title});
  });
  return arr;
}

function tryShowResults(){
  const p = setProgress();
  if(!p.doneAll){
    if(!confirm("هناك أسئلة لم تُجب عنها. هل تريد المتابعة؟")) return;
  }
  showResultsModal();
}

function computeScore(){
  let total=0, correct=0;
  BANK.forEach(q=>{
    q.branches.forEach((branch,bi)=>{
      const rec = ensureBranchRec(q.id,bi);
      const keys = collectPartKeys(branch);
      const grade = gradeBranch(q, branch, bi, rec.saved||{});
      keys.forEach(k=>{
        total++;
        if(grade.byKey[k]) correct++;
      });
    });
  });
  const pct = total? (correct/total)*100 : 0;
  return {correct,total,pct:Math.round(pct*10)/10};
}

function showResultsModal(){
  // BANK is built once; do not rebuild on each render
  const s = computeScore();

  const cards = BANK.map((q,qi)=>{
    const complete = isQuestionComplete(q);
    const correctQ = complete && isQuestionCorrect(q);

    let inner = `
      <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap">
        <div style="font-weight:900">سؤال ${qi+1}: ${escapeHtml(q.title)}</div>
        <span class="tag ${correctQ?"good":"bad"}">${correctQ?"✓ صحيح":"× غير صحيح"}</span>
      </div>
    `;

    q.branches.forEach((branch,bi)=>{
      const rec = ensureBranchRec(q.id,bi);
      const grade = gradeBranch(q, branch, bi, rec.saved||{});
      const keys = collectPartKeys(branch);

      inner += `<div style="margin-top:10px;font-weight:900;color:#0f2a3b">(${escapeHtml(branch.level)})</div>`;
      keys.forEach(k=>{
        const student = (rec.saved && rec.saved[k]!=null) ? rec.saved[k] : "—";
        const correctVal = branch.answers[k];
        const ok = grade.byKey[k];
        const correctText = (typeof correctVal === "string") ? correctVal : formatNumber(correctVal);

        inner += `
          <div class="partRow">
            <div><b>الجزء:</b> ${escapeHtml(k)}</div>
            <div><b>إجابتك:</b> ${escapeHtml(String(student))}</div>
            <div><b>الصحيح:</b> ${escapeHtml(String(correctText))} <span class="tag ${ok?"good":"bad"}" style="margin-right:8px">${ok?"✓":"×"}</span></div>
          </div>`;
      });
    });

    return `<div class="resultCard">${inner}</div>`;
  }).join("");

  const correctPct = s.total ? (s.correct/s.total)*100 : 0;
  const wrongPct = s.total ? ((s.total-s.correct)/s.total)*100 : 0;
  openModal("النتيجة", `
    <div class="scoreCard" style="margin-bottom:14px">
      <div>
        <div class="scoreBig">الدرجة: ${s.correct} من ${s.total} — ${s.pct}%</div>
        <div class="score-bar-wrap" style="margin:10px 0"><div class="score-bar-correct" style="width:${correctPct}%"></div><div class="score-bar-wrong" style="width:${wrongPct}%"></div></div>
        <div class="scoreSub">تم تصحيح كل جزء بشكل مستقل.</div>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn primary" onclick="window.print()">طباعة النتيجة</button>
        <button class="btn primary" onclick="window.__resetAll(); closeModal();">إعادة المحاولة</button>
      </div>
    </div>
    ${cards}
  `);
}

  const MASTERY_PROFILES_UNIFIED = {"q1": {"supports": ["q2", "q3", "q4", "q5"]}, "q2": {"supports": ["q3", "q4", "q5", "q6"]}, "q3": {"supports": ["q4", "q5", "q6", "q7"]}, "q4": {"supports": ["q5", "q6", "q7", "q8"]}, "q5": {"supports": ["q6", "q7", "q8", "q9"]}, "q6": {"supports": ["q7", "q8", "q9", "q10"]}, "q7": {"supports": ["q8", "q9", "q10", "q11"]}, "q8": {"supports": ["q9", "q10", "q11", "q1"]}, "q9": {"supports": ["q10", "q11", "q1", "q2"]}, "q10": {"supports": ["q11", "q1", "q2", "q3"]}, "q11": {"supports": ["q1", "q2", "q3", "q4"]}};

  function adaptiveSaveState(){
    try{ if(typeof saveState === "function") saveState(); }catch(e){}
  }

  function adaptiveIds(){
    const seen = new Set();
    return ADAPTIVE_SOURCE.map(t=>t && t.id).filter(id=>{
      if(!id || seen.has(id)) return false;
      seen.add(id);
      return true;
    });
  }

  function adaptiveTemplateById(id){
    return ADAPTIVE_SOURCE.find(t=>t && t.id === id) || TEMPLATES.find(t=>t && t.id === id) || null;
  }

  function adaptiveNormalizeOrder(order){
    const ids = adaptiveIds();
    const seen = new Set();
    return (Array.isArray(order) ? order : []).filter(id=>{
      if(!ids.includes(id) || seen.has(id)) return false;
      seen.add(id);
      return true;
    });
  }

  function adaptiveRng(seed){
    if(typeof seededRand === "function"){
      try{ return seededRand(seed); }catch(e){}
    }
    return Math.random;
  }

  function adaptiveShuffle(arr, seed){
    const r = adaptiveRng(seed);
    const copy = arr.slice();
    if(typeof shuffleInPlace === "function"){
      try{ return shuffleInPlace(copy, r); }catch(e){}
    }
    for(let i=copy.length-1;i>0;i--){
      const j = Math.floor(r() * (i + 1));
      const temp = copy[i];
      copy[i] = copy[j];
      copy[j] = temp;
    }
    return copy;
  }

  function adaptiveCore(ids){
    const core = MASTERY_CORE_UNIFIED.filter(id=>ids.includes(id));
    return core.length ? core : ids.slice(0, Math.min(3, ids.length));
  }

  function adaptiveBuildQuestionById(id){
    const t = adaptiveTemplateById(id);
    if(!t || typeof t.gen !== "function") return null;
    const v = (typeof getVariant === "function") ? getVariant(t.id) : 0;
    const g = t.gen(v) || {};
    const obj = { id:t.id, title:t.title, icon:t.icon, branches:g.branches || [] };
    if(g.sharedGraph != null) obj.sharedGraph = g.sharedGraph;
    return obj;
  }

  function adaptiveEnsureState(){
    const ids = adaptiveIds();
    if(!ids.length) return [];
    const core = adaptiveCore(ids);
    let active = adaptiveNormalizeOrder(state.activeOrder);
    if(state.masteryVersion !== MASTERY_VERSION_UNIFIED || !active.length){
      active = adaptiveShuffle(core, "mastery-core|" + MASTERY_VERSION_UNIFIED + "|" + Date.now() + "|" + Math.random());
      state.masteryVersion = MASTERY_VERSION_UNIFIED;
      state.masterySupportCount = 0;
      state.masterySupportLog = [];
      state.masterySupportSources = {};
    }
    state.masterySupportLog = Array.isArray(state.masterySupportLog) ? state.masterySupportLog : [];
    state.masterySupportSources = state.masterySupportSources && typeof state.masterySupportSources === "object" ? state.masterySupportSources : {};
    state.activeOrder = active;
    state.order = active.slice();
    if(state.currentIndex == null || state.currentIndex < 0) state.currentIndex = 0;
    if(state.currentIndex >= active.length) state.currentIndex = Math.max(0, active.length - 1);
    adaptiveSaveState();
    return active;
  }

  function adaptiveBuildBank(){
    const order = adaptiveEnsureState();
    const bank = order.map(adaptiveBuildQuestionById).filter(Boolean);
    if(bank.length) return bank;
    const ids = adaptiveIds();
    state.activeOrder = ids.slice(0, Math.min(3, ids.length));
    state.order = state.activeOrder.slice();
    adaptiveSaveState();
    return state.activeOrder.map(adaptiveBuildQuestionById).filter(Boolean);
  }

  function adaptiveStatus(q){
    if(!q) return "not_started";
    if(typeof getQuestionStatus === "function"){
      try{ return getQuestionStatus(q); }catch(e){}
    }
    if(typeof isQuestionComplete === "function"){
      try{
        if(!isQuestionComplete(q)) return "not_started";
        if(typeof isQuestionCorrect === "function" && isQuestionCorrect(q)) return "completed_correct";
        return "completed_wrong";
      }catch(e){}
    }
    return "not_started";
  }

  function adaptiveComplete(q){
    if(typeof isQuestionComplete === "function"){ try{ return !!isQuestionComplete(q); }catch(e){} }
    if(typeof isQuestionDone === "function"){ try{ return !!isQuestionDone(q); }catch(e){} }
    const st = adaptiveStatus(q);
    return st === "completed_correct" || st === "completed_wrong";
  }

  function adaptiveCorrect(q){
    if(typeof isQuestionCorrect === "function"){ try{ return !!isQuestionCorrect(q); }catch(e){} }
    return adaptiveStatus(q) === "completed_correct";
  }

  function adaptiveWrong(q){
    if(typeof isQuestionWrong === "function"){ try{ return !!isQuestionWrong(q); }catch(e){} }
    return adaptiveStatus(q) === "completed_wrong";
  }

  function adaptiveChooseSupportId(sourceId){
    const active = adaptiveEnsureState();
    const ids = adaptiveIds();
    const pools = [];
    if(sourceId && MASTERY_PROFILES_UNIFIED[sourceId]) pools.push(MASTERY_PROFILES_UNIFIED[sourceId].supports || []);
    pools.push(MASTERY_CORE_UNIFIED.filter(id=>id !== sourceId));
    pools.push(ids);
    for(const pool of pools){
      for(const id of pool){
        if(ids.includes(id) && !active.includes(id)) return id;
      }
    }
    return null;
  }

  function adaptiveAddSupport(sourceId, reason){
    const active = adaptiveEnsureState();
    const key = sourceId || "general";
    state.masterySupportSources = state.masterySupportSources || {};
    if((state.masterySupportSources[key] || 0) >= 1) return null;
    const nextId = adaptiveChooseSupportId(sourceId);
    if(!nextId) return null;
    /* تبديل السؤال تلقائياً (variant جديد + مسح كامل) */
    if(typeof bumpVariant === "function") try{ bumpVariant(nextId); }catch(e){}
    if(typeof clearAnswersForQuestion === "function") try{ clearAnswersForQuestion(nextId); }catch(e){}
    active.push(nextId);
    state.activeOrder = active;
    state.order = active.slice();
    state.masterySupportSources[key] = (state.masterySupportSources[key] || 0) + 1;
    state.masterySupportCount = (state.masterySupportCount || 0) + 1;
    state.masterySupportLog = state.masterySupportLog || [];
    state.masterySupportLog.push({ source:key, support:nextId, reason:reason || "mastery", at:Date.now() });
    adaptiveSaveState();
    return nextId;
  }

  function adaptiveActiveQuestions(){
    const active = new Set(adaptiveEnsureState());
    return (Array.isArray(BANK) ? BANK : []).filter(q=>active.has(q.id));
  }

  function adaptiveEnsureSupportForWeakQuestions(){
    if(!window.__examRunning) return false;
    if(!Array.isArray(BANK) || !BANK.length) BANK = adaptiveBuildBank();
    const activeQuestions = adaptiveActiveQuestions();
    const done = activeQuestions.filter(adaptiveComplete);
    const wrong = done.filter(adaptiveWrong);
    let added = false;
    wrong.forEach(q=>{ if(adaptiveAddSupport(q.id, "wrong")) added = true; });
    if(!added && done.length > 0 && done.length === activeQuestions.length && adaptiveEnsureState().length < adaptiveIds().length){
      const correctCount = done.filter(adaptiveCorrect).length;
      if((correctCount / done.length) < 0.85){
        const anchor = wrong[0] || done.find(q=>!adaptiveCorrect(q)) || done[done.length - 1];
        if(adaptiveAddSupport(anchor && anchor.id, "mastery-threshold")) added = true;
      }
    }
    if(added) BANK = adaptiveBuildBank();
    return added;
  }

  function adaptiveAfterSave(q){
    if(!q || !window.__examRunning) return;
    if(adaptiveWrong(q)){
      const added = adaptiveAddSupport(q.id, "wrong");
      if(added){
        BANK = adaptiveBuildBank();
        try{ if(typeof setProgress === "function") setProgress(); }catch(e){}
        try{ if(typeof renderSidebar === "function") renderSidebar(); }catch(e){}
      }
    }
  }

  function adaptiveWrapSavers(){
    if(typeof handleSaveBranch === "function" && !handleSaveBranch.__codexUniversalAdaptiveWrapped){
      const original = handleSaveBranch;
      handleSaveBranch = function(q, branch, bi){
        const result = original.apply(this, arguments);
        try{ adaptiveAfterSave(q); }catch(e){}
        return result;
      };
      handleSaveBranch.__codexUniversalAdaptiveWrapped = true;
    }
    if(typeof saveBranchAnswer === "function" && !saveBranchAnswer.__codexUniversalAdaptiveWrapped){
      const original = saveBranchAnswer;
      saveBranchAnswer = function(q, branch, bi, branchCard, saveBtn){
        const result = original.apply(this, arguments);
        try{ adaptiveAfterSave(q); }catch(e){}
        return result;
      };
      saveBranchAnswer.__codexUniversalAdaptiveWrapped = true;
    }
  }

  try{ buildBank = adaptiveBuildBank; }catch(e){}
  try{ window.ensureAdaptiveState = adaptiveEnsureState; }catch(e){}
  try{ window.ensureSupportForWeakQuestions = adaptiveEnsureSupportForWeakQuestions; }catch(e){}
  try{ window.maybeQueueAdaptiveSupport = function(q){ if(!q) return null; return adaptiveWrong(q) ? adaptiveAddSupport(q.id, "wrong") : null; }; }catch(e){}

  const originalNext = (typeof next === "function") ? next : null;
  next = function(){
    if(!Array.isArray(BANK) || !BANK.length) BANK = adaptiveBuildBank();
    if(adaptiveEnsureSupportForWeakQuestions()){
      try{ if(typeof renderAll === "function") renderAll(); }catch(e){}
    }
    const start = Math.min((state.currentIndex || 0) + 1, BANK.length);
    for(let i=start;i<BANK.length;i++){
      if(!adaptiveComplete(BANK[i])){ state.currentIndex = i; adaptiveSaveState(); renderAll(); return; }
    }
    for(let i=0;i<BANK.length;i++){
      if(!adaptiveComplete(BANK[i])){ state.currentIndex = i; adaptiveSaveState(); renderAll(); return; }
    }
    if(typeof tryShowResults === "function") return tryShowResults();
    if(originalNext) return originalNext.apply(this, arguments);
  };

  prev = function(){
    if(!Array.isArray(BANK) || !BANK.length) BANK = adaptiveBuildBank();
    for(let i=(state.currentIndex || 0)-1;i>=0;i--){
      if(BANK[i]){ state.currentIndex = i; adaptiveSaveState(); renderAll(); return; }
    }
  };

  tryShowResults = function(){
    try{ if(typeof syncAllInputs === "function") syncAllInputs(); }catch(e){}
    let p = null;
    try{ if(typeof setProgress === "function") p = setProgress(); }catch(e){}
    if(p && !p.doneAll){
      if(!confirm("هناك أسئلة لم تُجب عنها. هل تريد المتابعة؟")) return;
    }
    if(typeof showResultsModal === "function") return showResultsModal();
    if(typeof showResults === "function") return showResults();
  };

  adaptiveWrapSavers();
  if(typeof setProgress === "function" && !setProgress.__codexUniversalMasteryWrapped){
    const originalSetProgress = setProgress;
    setProgress = function(){
      const result = originalSetProgress.apply(this, arguments);
      const qCountEl = document.getElementById("qCount");
      if(qCountEl) qCountEl.textContent = "\u2014";
      return result;
    };
    setProgress.__codexUniversalMasteryWrapped = true;
  }
  BANK = adaptiveBuildBank();
  if(state.currentIndex >= BANK.length) state.currentIndex = Math.max(0, BANK.length - 1);
  adaptiveSaveState();
  try{ if(typeof renderAll === "function") renderAll(); }catch(e){}
})();
/* Codex Universal Adaptive Flow End */

window.__examRunning = isExamStarted();
  renderAll();
  if(window.__examRunning) startTimer(); else showIntroModal();

  }

  if(document.readyState === "loading"){
    document.addEventListener("DOMContentLoaded", __boot);
  }else{
    __boot();
  }
})();





</script>
